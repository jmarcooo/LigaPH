<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Liga PH - Home</title>
    
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a0e14" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LigaPH">
    <link rel="apple-touch-icon" href="assets/logo-192.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="global.css" />
    <script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen pb-24 md:pb-0 selection:bg-primary/30 overflow-x-hidden">

    <div id="global-sidebar-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300"></div>
    <aside id="global-sidebar" class="fixed top-0 left-0 h-full w-[80%] max-w-[320px] bg-[#0a0e14] border-r border-outline-variant/10 z-[70] transform -translate-x-full transition-transform duration-300 flex flex-col shadow-[20px_0_60px_rgba(0,0,0,0.6)]">
        
        <div class="px-6 py-6 flex items-center justify-between border-b border-outline-variant/10">
            <img src="assets/logo.png" alt="Liga PH Logo" class="h-8 object-contain drop-shadow-md">
            <button id="close-sidebar-btn" class="text-on-surface-variant hover:text-primary transition-colors p-2 -mr-2 rounded-full active:scale-95">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <a href="profile.html" class="px-6 py-10 flex flex-col items-center text-center group cursor-pointer hover:bg-surface-container-low/50 transition-colors">
            <div class="relative mb-4">
                <img id="sidebar-avatar" alt="Profile" class="w-24 h-24 rounded-full object-cover object-top border-2 border-outline-variant/20 shadow-lg group-hover:border-primary transition-colors duration-300" src="https://ui-avatars.com/api/?name=Loading&background=20262f&color=ff8f6f"/>
                <div class="absolute bottom-1 right-1 w-5 h-5 bg-primary rounded-full border-4 border-[#0a0e14]"></div>
            </div>

            <h2 id="sidebar-name" class="font-headline font-black text-xl text-on-surface tracking-tight truncate w-full uppercase group-hover:text-primary transition-colors duration-300">Loading...</h2>
            <p id="sidebar-email" class="text-xs text-on-surface-variant font-medium truncate w-full mt-1 mb-2">...</p>
            
            <div class="flex items-center justify-center gap-2 mb-4 w-full px-4 relative z-20">
                <p id="sidebar-player-id" class="text-[10px] text-outline-variant font-bold tracking-widest uppercase truncate max-w-[140px]" title="Full ID">ID: ...</p>
                <button id="copy-id-btn" class="flex items-center justify-center text-outline-variant hover:text-primary transition-colors p-1.5 rounded-md bg-surface-container border border-outline-variant/10 hover:border-primary/30 active:scale-95 shadow-sm" title="Copy Full ID">
                    <span class="material-symbols-outlined text-[14px]">content_copy</span>
                </button>
            </div>

            <span id="sidebar-role" class="bg-primary/10 text-primary border border-primary/20 text-[10px] px-4 py-1.5 rounded-full font-black tracking-widest uppercase shadow-sm mt-1">PLAYER</span>
        </a>

        <div class="px-6"><div class="h-[1px] bg-outline-variant/10"></div></div>

        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto custom-scrollbar">
            
            <a href="admin.html" id="sidebar-admin-shortcut" class="hidden items-center gap-4 px-4 py-3.5 rounded-2xl bg-error/10 text-error hover:bg-error/20 border border-error/20 transition-colors duration-200 group shadow-sm mb-4">
                <span class="material-symbols-outlined group-hover:scale-110 transition-transform text-[20px]">admin_panel_settings</span>
                <span class="font-headline font-black text-sm tracking-widest uppercase">Admin Dashboard</span>
            </a>

            <a href="#" class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-on-surface hover:bg-surface-container-highest transition-colors duration-200 group">
                <span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">settings</span>
                <span class="font-headline font-semibold text-sm tracking-wide">Settings and Privacy</span>
            </a>
            <a href="#" class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-on-surface hover:bg-surface-container-highest transition-colors duration-200 group">
                <span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">help</span>
                <span class="font-headline font-semibold text-sm tracking-wide">Help and Support</span>
            </a>
        </nav>

        <div class="px-6"><div class="h-[1px] bg-outline-variant/10"></div></div>

        <div class="p-6 mb-2">
            <button id="sidebar-logout-btn" class="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-xl text-error hover:bg-error/10 border border-transparent hover:border-error/20 transition-all duration-200 group active:scale-95">
                <span class="material-symbols-outlined text-xl group-hover:-translate-x-1 transition-transform">logout</span>
                <span class="font-headline font-bold text-sm uppercase tracking-widest">Logout</span>
            </button>
        </div>
        
    </aside>

    <header class="fixed top-0 w-full z-50 bg-[#0a0e14] dark:bg-[#0a0e14] bg-gradient-to-b from-[#0f141a] to-transparent">
        <div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <button id="menu-btn" class="text-primary active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <a href="home.html" class="text-2xl font-black italic tracking-tighter text-primary uppercase font-headline hover:text-primary-container transition-colors">Liga PH</a>
            </div>
            <div class="flex items-center gap-3 md:gap-6">
                <nav class="hidden md:flex gap-8 font-headline font-bold tracking-tight">
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="home.html">Home</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="feeds.html">Feed</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="listings.html">Games</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="roster.html">Roster</a>
                </nav>
                
                <button id="header-search-btn" class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-container-highest active:scale-95 flex items-center justify-center">
                    <span class="material-symbols-outlined text-[26px]">search</span>
                </button>
            
                <a href="notifications.html" class="relative p-2 text-on-surface-variant hover:text-primary transition-colors rounded-full hover:bg-surface-container-highest active:scale-95 z-50 flex items-center justify-center">
                    <span class="material-symbols-outlined text-[28px]">notifications</span>
                    <span class="absolute top-2 right-2.5 w-2.5 h-2.5 bg-error rounded-full border-2 border-background hidden"></span>
                </a>
            </div>
        </div>
    </header>

    <main class="pt-24 px-4 md:px-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="col-span-1 lg:col-span-8 space-y-6">
            
            <div id="dynamic-slider-container" class="relative w-full rounded-2xl md:rounded-3xl overflow-hidden bg-surface-container-high border border-outline-variant/20 shadow-lg group h-[600px] md:h-[700px]">
                
                <div id="slider-loader" class="absolute inset-0 z-50 bg-surface-container-high p-6 md:p-10 flex flex-col justify-end animate-pulse">
                    <div class="w-24 h-6 bg-surface-container-highest rounded-full mb-3 shadow-inner"></div>
                    <div class="w-3/4 max-w-lg h-10 md:h-14 bg-surface-container-highest rounded-xl mb-3 shadow-inner"></div>
                    <div class="w-1/2 max-w-md h-4 md:h-5 bg-surface-container-highest rounded-lg mb-6 shadow-inner"></div>
                    <div class="w-32 h-10 bg-surface-container-highest rounded-xl mt-4 shadow-inner"></div>
                </div>

                <div id="slider-track" class="flex w-full h-full overflow-x-auto snap-x snap-mandatory hide-scrollbar smooth-scroll relative z-10 opacity-0 transition-opacity duration-500">
                </div>

                <button id="slider-prev" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-black/50 hover:bg-black/80 text-white rounded-full flex items-center justify-center z-30 opacity-0 group-hover:opacity-100 transition-opacity hidden md:flex border border-white/10 backdrop-blur-sm">
                    <span class="material-symbols-outlined">chevron_left</span>
                </button>
                <button id="slider-next" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-black/50 hover:bg-black/80 text-white rounded-full flex items-center justify-center z-30 opacity-0 group-hover:opacity-100 transition-opacity hidden md:flex border border-white/10 backdrop-blur-sm">
                    <span class="material-symbols-outlined">chevron_right</span>
                </button>

                <div id="slider-dots" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 z-30"></div>
            </div>

            <div>
                <div class="flex items-center gap-3 mb-6 px-2 mt-8">
                    <span class="material-symbols-outlined text-primary text-[28px]">verified</span>
                    <h2 class="font-headline text-2xl font-black italic uppercase tracking-tighter text-on-surface">LigaPH Official News</h2>
                </div>

                <div id="official-news-container" class="space-y-4">
                    <div class="animate-pulse space-y-4">
                        <div class="bg-surface-container-low rounded-2xl p-5 md:p-6 border border-outline-variant/5">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-xl bg-surface-container-highest"></div>
                                    <div class="space-y-2">
                                        <div class="h-3 w-24 bg-surface-container-highest rounded"></div>
                                        <div class="h-2 w-16 bg-surface-container-highest rounded"></div>
                                    </div>
                                </div>
                                <div class="h-4 w-16 bg-surface-container-highest rounded"></div>
                            </div>
                            <div class="h-6 w-3/4 bg-surface-container-highest rounded mb-3"></div>
                            <div class="aspect-square w-full bg-surface-container-highest rounded-xl mb-4"></div>
                            <div class="space-y-2">
                                <div class="h-3 w-full bg-surface-container-highest rounded"></div>
                                <div class="h-3 w-full bg-surface-container-highest rounded"></div>
                                <div class="h-3 w-2/3 bg-surface-container-highest rounded"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="hidden lg:flex flex-col lg:col-span-4 space-y-6">
            <div class="bg-surface-container-low p-6 rounded-2xl border border-outline-variant/10 shadow-sm">
                <h3 class="font-headline font-black italic text-lg uppercase mb-4 text-on-surface">Resource Center</h3>
                <div class="space-y-2">
                    <a href="#" class="flex items-center justify-between p-3 bg-surface-container-highest rounded-xl border border-outline-variant/10 hover:border-primary/50 hover:text-primary transition-colors group cursor-pointer">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-outline-variant group-hover:text-primary">gavel</span>
                            <span class="font-bold text-sm text-on-surface group-hover:text-primary transition-colors">Rules & Regulations</span>
                        </div>
                        <span class="material-symbols-outlined text-sm text-outline-variant">chevron_right</span>
                    </a>
                    <a href="#" class="flex items-center justify-between p-3 bg-surface-container-highest rounded-xl border border-outline-variant/10 hover:border-primary/50 hover:text-primary transition-colors group cursor-pointer">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-outline-variant group-hover:text-primary">help</span>
                            <span class="font-bold text-sm text-on-surface group-hover:text-primary transition-colors">How Ratings Work</span>
                        </div>
                        <span class="material-symbols-outlined text-sm text-outline-variant">chevron_right</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <nav id="action-bar-container"></nav>
    
    <script type="module" src="sidebar.js"></script>
    <script type="module" src="action-bar.js"></script>
    <script type="module" src="firebase-setup.js"></script>
    <script type="module" src="home.js"></script>
</body>
</html>
