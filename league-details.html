<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta name="view-transition" content="same-origin" />
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Liga PH - League Details</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="tailwind-theme.js"></script>
<link rel="stylesheet" href="global.css" />
<script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0a0e14] dark:bg-[#0a0e14] bg-gradient-to-b from-[#0f141a] to-transparent">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button onclick="window.history.back()" class="text-[#ff8f6f] active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<a href="feeds.html" class="text-2xl font-black italic tracking-tighter text-[#ff8f6f] uppercase font-headline hover:text-primary-container transition-colors">Liga PH</a>
</div>
</div>
</header>

<main id="league-details-main" class="pt-24 pb-32 px-4 max-w-5xl mx-auto space-y-8 animate-pulse">
    <!-- Loading Skeleton -->
    <div class="w-full h-48 bg-surface-container-high rounded-3xl mb-8 flex items-center justify-center">
        <span class="material-symbols-outlined text-6xl opacity-20">emoji_events</span>
    </div>
    <div class="h-10 bg-surface-container-high rounded w-3/4 mb-4"></div>
    <div class="h-6 bg-surface-container-high rounded w-1/2 mb-8"></div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="h-24 bg-surface-container-high rounded-xl"></div>
        <div class="h-24 bg-surface-container-high rounded-xl"></div>
    </div>
</main>

<!-- Bottom Interaction Bar (The "Join" Shell) -->
<div class="fixed bottom-0 left-0 w-full z-50 px-4 pb-[calc(1rem+env(safe-area-inset-bottom))]">
    <div class="max-w-xl mx-auto bg-[#0a0e14]/90 backdrop-blur-xl rounded-2xl p-4 flex items-center justify-between shadow-[0_-8px_32px_rgba(31,40,130,0.2)] border border-outline-variant/10">
        <div class="flex flex-col">
            <span class="text-[10px] text-outline uppercase font-bold tracking-widest">Season Status</span>
            <span id="league-status-text" class="font-headline text-lg font-black text-primary">Open Enrollment</span>
        </div>
        <div class="flex gap-3">
            <button id="join-league-btn" disabled class="bg-primary/50 text-on-primary px-8 py-3 rounded-xl font-headline font-black uppercase tracking-tighter shadow-lg transition-all">
                PLEASE WAIT
            </button>
        </div>
    </div>
</div>

<script type="module" src="sidebar.js"></script>
<script type="module" src="firebase-setup.js"></script>
<script type="module" src="league-details.js"></script>
</body>
</html>
