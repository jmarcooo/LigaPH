<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Liga PH - Feed</title>
    
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a0e14" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LigaPH">
    <link rel="apple-touch-icon" href="assets/logo-192.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="global.css" />
    <script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen pb-24 md:pb-0 selection:bg-primary/30 overflow-x-hidden">

    <div id="global-sidebar-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300"></div>
    <aside id="global-sidebar" class="fixed top-0 left-0 h-full w-[80%] max-w-[320px] bg-[#0a0e14] border-r border-outline-variant/10 z-[70] transform -translate-x-full transition-transform duration-300 flex flex-col shadow-[20px_0_60px_rgba(0,0,0,0.6)]">
        
        <div class="px-6 py-6 flex items-center justify-between border-b border-outline-variant/10">
            <img src="assets/logo.png" alt="Liga PH Logo" class="h-8 object-contain drop-shadow-md">
            <button id="close-sidebar-btn" class="text-on-surface-variant hover:text-primary transition-colors p-2 -mr-2 rounded-full active:scale-95">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <a href="profile.html" class="px-6 py-10 flex flex-col items-center text-center group cursor-pointer hover:bg-surface-container-low/50 transition-colors">
            <div class="relative mb-4">
                <img id="sidebar-avatar" alt="Profile" class="w-24 h-24 rounded-full object-cover object-top border-2 border-outline-variant/20 shadow-lg group-hover:border-primary transition-colors duration-300" src="https://ui-avatars.com/api/?name=Loading&background=20262f&color=ff8f6f"/>
                <div class="absolute bottom-1 right-1 w-5 h-5 bg-primary rounded-full border-4 border-[#0a0e14]"></div>
            </div>

            <h2 id="sidebar-name" class="font-headline font-black text-xl text-on-surface tracking-tight truncate w-full uppercase group-hover:text-primary transition-colors duration-300">Loading...</h2>
            <p id="sidebar-email" class="text-xs text-on-surface-variant font-medium truncate w-full mt-1 mb-2">...</p>
            
            <div class="flex items-center justify-center gap-2 mb-4 w-full px-4 relative z-20">
                <p id="sidebar-player-id" class="text-[10px] text-outline-variant font-bold tracking-widest uppercase truncate max-w-[140px]" title="Full ID">ID: ...</p>
                <button id="copy-id-btn" class="flex items-center justify-center text-outline-variant hover:text-primary transition-colors p-1.5 rounded-md bg-surface-container border border-outline-variant/10 hover:border-primary/30 active:scale-95 shadow-sm" title="Copy Full ID">
                    <span class="material-symbols-outlined text-[14px]">content_copy</span>
                </button>
            </div>

            <span id="sidebar-role" class="bg-primary/10 text-primary border border-primary/20 text-[10px] px-4 py-1.5 rounded-full font-black tracking-widest uppercase shadow-sm mt-1">PLAYER</span>
        </a>

        <div class="px-6"><div class="h-[1px] bg-outline-variant/10"></div></div>

        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto custom-scrollbar">
            <a href="#" class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-on-surface hover:bg-surface-container-highest transition-colors duration-200 group">
                <span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">settings</span>
                <span class="font-headline font-semibold text-sm tracking-wide">Settings and Privacy</span>
            </a>
            <a href="#" class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-on-surface hover:bg-surface-container-highest transition-colors duration-200 group">
                <span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">help</span>
                <span class="font-headline font-semibold text-sm tracking-wide">Help and Support</span>
            </a>
        </nav>

        <div class="px-6"><div class="h-[1px] bg-outline-variant/10"></div></div>

        <div class="p-6 mb-2">
            <button id="sidebar-logout-btn" class="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-xl text-error hover:bg-error/10 border border-transparent hover:border-error/20 transition-all duration-200 group active:scale-95">
                <span class="material-symbols-outlined text-xl group-hover:-translate-x-1 transition-transform">logout</span>
                <span class="font-headline font-bold text-sm uppercase tracking-widest">Logout</span>
            </button>
        </div>
        
    </aside>

    <header class="fixed top-0 w-full z-50 bg-[#0a0e14] dark:bg-[#0a0e14] bg-gradient-to-b from-[#0f141a] to-transparent">
        <div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <button id="menu-btn" class="text-primary active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <a href="home.html" class="text-2xl font-black italic tracking-tighter text-primary uppercase font-headline hover:text-primary-container transition-colors">Liga PH</a>
            </div>
            
            <div class="flex items-center gap-3 md:gap-6">
                <nav class="hidden md:flex gap-8 font-headline font-bold tracking-tight">
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="home.html">Home</a>
                    <a class="text-primary hover:text-primary-container transition-colors duration-200" href="feeds.html">Feed</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="listings.html">Games</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="roster.html">Roster</a>
                </nav>
                
                <button id="header-search-btn" class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-container-highest active:scale-95 flex items-center justify-center">
                    <span class="material-symbols-outlined text-[26px]">search</span>
                </button>

                <a href="notifications.html" class="relative p-2 text-on-surface-variant hover:text-primary transition-colors rounded-full hover:bg-surface-container-highest active:scale-95 z-50 flex items-center justify-center">
                    <span class="material-symbols-outlined text-[28px]">notifications</span>
                    <span class="absolute top-2 right-2.5 w-2.5 h-2.5 bg-error rounded-full border-2 border-background hidden"></span>
                </a>
            </div>
        </div>
    </header>

    <main class="pt-24 px-4 md:px-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="col-span-1 lg:col-span-8 space-y-6">
            
            <div class="bg-surface-container-low rounded-3xl p-5 md:p-6 border border-outline-variant/10 shadow-md">
                <form id="create-post-form" class="space-y-4">
                    <div class="flex gap-4 items-start">
                        <img id="current-user-avatar" src="https://ui-avatars.com/api/?name=User&background=20262f&color=ff8f6f" class="w-12 h-12 md:w-14 md:h-14 rounded-full object-cover object-top border-2 border-outline-variant/30 shrink-0 bg-surface-container cursor-pointer hover:border-primary transition-colors" onclick="window.location.href='profile.html'">
                        <div class="flex-1 space-y-3 pt-2">
                            <textarea id="post-content" rows="3" placeholder="What's happening on the court?" class="w-full bg-transparent border-none text-on-surface focus:ring-0 resize-none placeholder:text-outline-variant/50 text-lg md:text-xl px-0 py-0"></textarea>
                            
                            <input type="text" id="post-location-input" placeholder="Add location..." class="hidden w-full bg-[#0a0e14] border border-outline-variant/30 rounded-xl px-4 py-3 text-sm text-on-surface focus:border-primary focus:ring-1 focus:outline-none transition-all">
                            
                            <div id="post-image-preview-container" class="hidden relative w-full max-w-sm rounded-2xl overflow-hidden border border-outline-variant/20 shadow-sm mt-3 aspect-square">
                                <img id="post-image-preview" src="" class="w-full h-full object-cover">
                                <button type="button" id="remove-post-image-btn" class="absolute top-2 right-2 bg-black/60 text-white rounded-full p-1.5 hover:bg-error transition-colors backdrop-blur-sm">
                                    <span class="material-symbols-outlined text-[18px]">close</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex flex-wrap sm:flex-nowrap items-center justify-between pt-4 border-t border-outline-variant/10 gap-3">
                        <div class="flex gap-2">
                            <label class="text-primary hover:bg-primary/10 p-2.5 rounded-full cursor-pointer transition-colors flex items-center justify-center border border-transparent hover:border-primary/20" title="Attach Image">
                                <span class="material-symbols-outlined text-[20px]">image</span>
                                <input type="file" id="post-image-input" accept="image/*" class="hidden">
                            </label>
                            <button type="button" id="add-location-btn" class="text-secondary hover:bg-secondary/10 p-2.5 rounded-full transition-colors flex items-center justify-center border border-transparent hover:border-secondary/20" title="Add Location">
                                <span class="material-symbols-outlined text-[20px]">location_on</span>
                            </button>
                            <div class="flex items-center ml-2 border-l border-outline-variant/10 pl-4">
                                <span class="material-symbols-outlined text-[18px] text-outline-variant mr-1">visibility</span>
                                <select id="post-visibility" class="bg-transparent border-none text-[10px] font-black text-outline uppercase tracking-widest focus:ring-0 cursor-pointer p-0 m-0">
                                    <option value="Public" class="bg-surface-container text-on-surface">Public</option>
                                    <option value="Connections Only" class="bg-surface-container text-on-surface">Connections</option>
                                    <option value="Squad Only" class="bg-surface-container text-on-surface">Squad Only</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" id="submit-post-btn" class="w-full sm:w-auto bg-primary text-on-primary-container px-8 py-3 rounded-full font-black uppercase text-xs tracking-widest hover:brightness-110 active:scale-95 transition-all shadow-md shadow-primary/20 disabled:opacity-50">Post</button>
                    </div>
                </form>
            </div>

            <div id="feed-container" class="space-y-6">
                <div class="animate-pulse space-y-6">
                    <div class="bg-surface-container-low rounded-3xl p-6 border border-outline-variant/5">
                        <div class="flex gap-4 mb-4">
                            <div class="w-12 h-12 rounded-full bg-surface-container-highest shrink-0"></div>
                            <div class="flex-1 space-y-2 py-1">
                                <div class="h-4 bg-surface-container-highest rounded w-1/3"></div>
                                <div class="h-3 bg-surface-container-highest rounded w-1/4"></div>
                            </div>
                        </div>
                        <div class="space-y-2 mb-4">
                            <div class="h-3 bg-surface-container-highest rounded w-full"></div>
                            <div class="h-3 bg-surface-container-highest rounded w-5/6"></div>
                        </div>
                        <div class="aspect-square w-full bg-surface-container-highest rounded-2xl"></div>
                    </div>
                </div>
            </div>
            
            <div id="feed-loading-indicator" class="py-8 text-center text-outline hidden flex items-center justify-center gap-2">
                <span class="material-symbols-outlined animate-spin text-primary">refresh</span> Loading more...
            </div>
        </div>

        <div class="hidden lg:flex flex-col lg:col-span-4 space-y-6">
            
            <div class="bg-surface-container-low p-6 rounded-3xl border border-outline-variant/10 shadow-sm">
                <h3 class="font-headline font-black italic text-lg uppercase mb-5 flex items-center justify-between text-on-surface">
                    <span class="flex items-center gap-2"><span class="material-symbols-outlined text-tertiary text-[20px]">calendar_month</span> Up Next</span>
                    <button onclick="window.location.href='listings.html'" class="text-[9px] font-bold text-outline uppercase tracking-widest hover:text-primary transition-colors">See All</button>
                </h3>
                <div id="upcoming-games-container" class="space-y-3">
                    <div class="animate-pulse flex gap-4">
                        <div class="w-10 h-10 bg-surface-container-highest rounded-lg"></div>
                        <div class="flex-1 space-y-2 py-1"><div class="h-3 bg-surface-container-highest rounded w-3/4"></div><div class="h-2 bg-surface-container-highest rounded w-1/2"></div></div>
                    </div>
                </div>
            </div>

            <div class="bg-surface-container-low p-6 rounded-3xl border border-outline-variant/10 shadow-sm">
                <h3 class="font-headline font-black italic text-lg uppercase mb-5 flex items-center justify-between text-on-surface">
                    <span class="flex items-center gap-2"><span class="material-symbols-outlined text-primary text-[20px]">shield</span> Top Squads</span>
                    <button onclick="window.location.href='roster.html'" class="text-[9px] font-bold text-outline uppercase tracking-widest hover:text-primary transition-colors">See All</button>
                </h3>
                <div id="top-roster-container" class="space-y-3">
                    <div class="animate-pulse flex gap-4">
                        <div class="w-10 h-10 bg-surface-container-highest rounded-lg"></div>
                        <div class="flex-1 space-y-2 py-1"><div class="h-3 bg-surface-container-highest rounded w-3/4"></div><div class="h-2 bg-surface-container-highest rounded w-1/2"></div></div>
                    </div>
                </div>
            </div>

            <div class="bg-surface-container-low p-6 rounded-3xl border border-outline-variant/10 shadow-sm">
                <h3 class="font-headline font-black italic text-lg uppercase mb-5 flex items-center justify-between text-on-surface">
                    <span class="flex items-center gap-2"><span class="material-symbols-outlined text-secondary text-[20px]">trending_up</span> Hot Players</span>
                    <button onclick="window.location.href='roster.html'" class="text-[9px] font-bold text-outline uppercase tracking-widest hover:text-primary transition-colors">See All</button>
                </h3>
                <div id="rising-talents-container" class="grid grid-cols-3 gap-3">
                    <div class="animate-pulse w-16 h-16 bg-surface-container-highest rounded-2xl mx-auto"></div>
                    <div class="animate-pulse w-16 h-16 bg-surface-container-highest rounded-2xl mx-auto"></div>
                    <div class="animate-pulse w-16 h-16 bg-surface-container-highest rounded-2xl mx-auto"></div>
                </div>
            </div>
            
        </div>
    </main>

    <div id="image-modal" class="fixed inset-0 z-[100] bg-black/95 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <button id="close-image-modal" class="absolute top-4 right-4 z-50 bg-white/10 text-white rounded-full p-2 hover:bg-white/20 transition-colors">
            <span class="material-symbols-outlined text-[24px]">close</span>
        </button>
        <img id="lightbox-image" src="" class="max-w-full max-h-[90vh] object-contain rounded-xl shadow-2xl scale-95 transition-transform duration-300">
    </div>

    <nav id="action-bar-container"></nav>
    <script type="module" src="sidebar.js"></script>
    <script type="module" src="action-bar.js"></script>
    <script type="module" src="firebase-setup.js"></script>
    <script type="module" src="feeds.js"></script>
</body>
</html>
