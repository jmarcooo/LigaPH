<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Liga PH - Game Details</title>
    
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a0e14" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LigaPH">
    <link rel="apple-touch-icon" href="assets/logo-192.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="global.css" />
    <script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen pb-24 md:pb-0">

    <header class="fixed top-0 w-full z-50 bg-[#0a0e14] dark:bg-[#0a0e14] bg-gradient-to-b from-[#0f141a] to-transparent">
        <div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="text-primary active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10 md:hidden">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <a href="home.html" class="text-2xl font-black italic tracking-tighter text-primary uppercase font-headline hover:text-primary-container transition-colors">Liga PH</a>
            </div>
            <div class="flex items-center gap-3 md:gap-6">
                <nav class="hidden md:flex gap-8 font-headline font-bold tracking-tight">
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="home.html">Home</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="feeds.html">Feed</a>
                    <a class="text-primary hover:text-primary-container transition-colors duration-200" href="listings.html">Games</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="roster.html">Roster</a>
                </nav>
                
                <button id="header-search-btn" class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-container-highest active:scale-95 flex items-center justify-center">
                    <span class="material-symbols-outlined text-[26px]">search</span>
                </button>

                <a href="notifications.html" class="relative p-2 text-on-surface-variant hover:text-primary transition-colors rounded-full hover:bg-surface-container-highest active:scale-95 z-50 flex items-center justify-center">
                    <span class="material-symbols-outlined text-[28px]">notifications</span>
                    <span class="absolute top-2 right-2.5 w-2.5 h-2.5 bg-error rounded-full border-2 border-background hidden"></span>
                </a>
            </div>
        </div>
    </header>

    <main id="game-details-main" class="pt-24 pb-32 px-4 max-w-7xl mx-auto w-full animate-pulse grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-8 space-y-6 mt-2">
            <div class="w-full h-[300px] md:h-[420px] bg-surface-container-highest rounded-3xl"></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="h-48 bg-surface-container-highest rounded-2xl"></div>
                <div class="h-48 bg-surface-container-highest rounded-2xl"></div>
            </div>
        </div>
        <div class="lg:col-span-4 mt-6 lg:mt-2 space-y-6">
            <div class="h-40 bg-surface-container-highest rounded-2xl"></div>
            <div class="h-24 bg-surface-container-highest rounded-2xl"></div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full z-40 px-4 pb-[calc(1rem+env(safe-area-inset-bottom))] pointer-events-none" id="bottom-bar-wrapper">
        <div class="max-w-2xl mx-auto bg-[#0a0e14]/90 backdrop-blur-xl rounded-2xl p-4 flex items-center justify-center shadow-[0_-8px_32px_rgba(255,143,111,0.15)] border border-primary/20 pointer-events-auto">
            <button id="join-game-btn" disabled class="w-full bg-surface-variant text-outline px-6 py-3 rounded-xl font-headline font-black uppercase tracking-tighter transition-all shadow-md active:scale-95 text-sm md:text-base flex items-center justify-center gap-2">
                WAIT
            </button>
        </div>
    </div>

    <div id="manage-slot-modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-surface-container border border-outline-variant/20 rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl scale-95 transition-transform duration-300">
            <div class="p-6 border-b border-outline-variant/10 flex justify-between items-center">
                <h2 id="manage-slot-title" class="font-headline text-xl font-black italic uppercase tracking-tighter text-on-surface">Manage Slot</h2>
                <button id="close-slot-modal" class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-container-highest">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <button id="invite-connection-btn" class="w-full bg-surface-container-highest hover:bg-surface-bright text-on-surface font-black uppercase tracking-widest py-4 rounded-xl transition-all text-sm flex items-center justify-center gap-2 border border-outline-variant/30 active:scale-95">
                    <span class="material-symbols-outlined text-primary">person_add</span> Invite Connection
                </button>
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-outline-variant/20"></div>
                    <span class="flex-shrink-0 mx-4 text-outline-variant text-[10px] font-black uppercase tracking-widest">OR</span>
                    <div class="flex-grow border-t border-outline-variant/20"></div>
                </div>
                <button id="reserve-slot-btn" class="w-full bg-[#0a0e14] hover:border-primary/50 text-outline border border-outline-variant/20 font-black uppercase tracking-widest py-4 rounded-xl transition-all text-sm flex items-center justify-center gap-2 active:scale-95">
                    <span class="material-symbols-outlined">lock</span> Reserve Slot
                </button>
                <button id="remove-reserve-btn" class="hidden w-full bg-error/10 hover:bg-error/20 text-error font-black uppercase tracking-widest py-4 rounded-xl transition-all text-sm flex items-center justify-center gap-2 border border-error/20 active:scale-95">
                    <span class="material-symbols-outlined">lock_open</span> Remove Reservation
                </button>
            </div>
        </div>
    </div>

    <div id="invite-list-modal" class="fixed inset-0 z-[110] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-surface-container border border-outline-variant/20 rounded-3xl w-full max-w-md overflow-hidden shadow-2xl scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]">
            <div class="p-6 border-b border-outline-variant/10 flex justify-between items-center bg-surface-container-high">
                <h2 class="font-headline text-xl font-black italic uppercase tracking-tighter text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined">group_add</span> Invite Players
                </h2>
                <button id="close-invite-list-modal" class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-container-highest">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="overflow-y-auto flex-1 p-4 hide-scrollbar space-y-3" id="invite-list-container">
                </div>
        </div>
    </div>

    <div id="manage-game-modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-surface-container-high border border-outline-variant/20 rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl scale-95 transition-transform duration-300 flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-outline-variant/10 flex justify-between items-center shrink-0">
                <h2 class="font-headline text-2xl font-black italic uppercase tracking-tighter text-primary">Manage Game</h2>
                <button id="close-manage-game-modal" class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-container-highest">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="overflow-y-auto flex-1 p-6 hide-scrollbar">
                <form id="manage-game-form" class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Game Title</label>
                        <input type="text" id="manage-game-title" required class="w-full bg-[#0a0e14] border border-outline-variant/30 rounded-xl p-3 text-sm text-on-surface focus:ring-primary focus:border-primary transition-all font-medium">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Date</label>
                            <input type="date" id="manage-game-date" required class="w-full bg-[#0a0e14] border border-outline-variant/30 rounded-xl p-3 text-sm text-on-surface focus:ring-primary focus:border-primary transition-all font-medium appearance-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Time</label>
                            <input type="time" id="manage-game-time" required class="w-full bg-[#0a0e14] border border-outline-variant/30 rounded-xl p-3 text-sm text-on-surface focus:ring-primary focus:border-primary transition-all font-medium appearance-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Location</label>
                        <input type="text" id="manage-game-location" required class="w-full bg-[#0a0e14] border border-outline-variant/30 rounded-xl p-3 text-sm text-on-surface focus:ring-primary focus:border-primary transition-all font-medium">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Description / Court Details</label>
                        <textarea id="manage-game-desc" rows="3" class="w-full bg-[#0a0e14] border border-outline-variant/30 rounded-xl p-3 text-sm text-on-surface focus:ring-primary focus:border-primary transition-all font-medium resize-none"></textarea>
                    </div>
                    
                    <div class="pt-6 mt-2 border-t border-outline-variant/10 space-y-3">
                        <button type="submit" id="submit-manage-game-btn" class="w-full bg-primary hover:brightness-110 text-on-primary-container font-black uppercase tracking-widest py-4 rounded-xl shadow-lg active:scale-95 transition-all text-sm flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">save</span> Save Changes
                        </button>
                        <button type="button" onclick="window.deleteGame()" class="w-full bg-error/10 hover:bg-error/20 text-error font-black uppercase tracking-widest py-3 rounded-xl transition-all text-[10px] flex items-center justify-center gap-2 border border-error/20">
                            <span class="material-symbols-outlined text-[14px]">delete_forever</span> Cancel / Delete Game
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="rating-modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-surface-container-high p-6 md:p-8 rounded-2xl w-full max-w-sm border border-outline-variant/20 shadow-2xl transform scale-95 transition-transform">
            <h3 class="font-headline font-black italic text-2xl text-primary uppercase mb-1">Rate <span id="rating-target-name">Player</span></h3>
            <p class="text-xs text-on-surface-variant mb-6">Rate this player across 5 key attributes.</p>
            
            <form id="rating-form" class="space-y-5">
                <input type="hidden" id="rating-target-id" value="">
                <div id="rating-stars-container" class="space-y-4"></div>
                <div class="flex gap-4 pt-6 mt-6 border-t border-outline-variant/10">
                    <button type="button" id="close-rating-modal" class="flex-1 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-widest text-on-surface-variant bg-surface-container hover:bg-surface-bright transition-colors">Cancel</button>
                    <button type="submit" id="submit-rating-btn" class="flex-1 px-4 py-3 rounded-xl text-xs font-black uppercase tracking-widest text-on-primary bg-primary hover:bg-primary/90 transition-all active:scale-95 shadow-lg shadow-primary/20">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <div id="image-modal" class="fixed inset-0 z-[120] bg-black/95 backdrop-blur-sm hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <button id="close-image-modal" class="absolute top-6 right-6 text-white bg-black/50 hover:bg-black/80 rounded-full p-2 transition-colors">
            <span class="material-symbols-outlined text-3xl">close</span>
        </button>
        <img id="lightbox-image" src="" class="max-w-[95vw] max-h-[90vh] object-contain rounded-lg scale-95 transition-transform duration-300 shadow-2xl">
    </div>

    <nav id="action-bar-container"></nav>

    <script type="module" src="sidebar.js"></script>
    <script type="module" src="action-bar.js"></script>
    <script type="module" src="firebase-setup.js"></script>
    <script type="module" src="game-details.js"></script>
</body>
</html>
