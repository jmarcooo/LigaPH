<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Liga PH - Game Details</title>
    
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a0e14" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LigaPH">
    <link rel="apple-touch-icon" href="assets/logo-192.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="global.css" />
    <script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen selection:bg-primary/30">

    <header class="fixed top-0 w-full z-50 bg-[#0a0e14]/80 backdrop-blur-xl border-b border-outline-variant/10">
        <div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="text-primary active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <a href="feeds.html" class="text-2xl font-black italic tracking-tighter text-primary uppercase font-headline hover:text-primary-container transition-colors">Liga PH</a>
            </div>
        </div>
    </header>

    <main id="game-details-main" class="pt-24 pb-32 px-4 md:px-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-4 md:gap-6 animate-pulse">
        <div class="lg:col-span-8 h-64 md:h-96 bg-surface-container-high rounded-3xl"></div>
        <div class="lg:col-span-4 grid grid-cols-2 gap-4">
            <div class="h-24 bg-surface-container-high rounded-2xl"></div>
            <div class="h-24 bg-surface-container-high rounded-2xl"></div>
            <div class="h-24 bg-surface-container-high rounded-2xl"></div>
            <div class="h-24 bg-surface-container-high rounded-2xl"></div>
            <div class="col-span-2 h-24 bg-surface-container-high rounded-2xl"></div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 w-full z-50 px-4 pb-[calc(1rem+env(safe-area-inset-bottom))] pointer-events-none">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-3 md:gap-4 pointer-events-auto">
            <button id="share-game-btn" class="w-14 h-14 md:w-16 md:h-16 bg-[#14171d] border border-outline-variant/20 rounded-2xl flex items-center justify-center text-on-surface hover:bg-surface-bright transition-all shrink-0 shadow-xl active:scale-95">
                <span class="material-symbols-outlined">share</span>
            </button>
            <button id="join-game-btn" disabled class="flex-1 bg-primary text-on-primary-container h-14 md:h-16 rounded-2xl font-headline font-black uppercase tracking-widest shadow-[0_0_30px_rgba(255,143,111,0.25)] hover:brightness-110 transition-all flex items-center justify-center gap-2 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                LOADING <span class="material-symbols-outlined">chevron_right</span>
            </button>
        </div>
    </div>

    <div id="image-modal" class="fixed inset-0 z-[100] bg-black/95 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <button id="close-image-modal" class="absolute top-4 right-4 z-50 bg-white/10 text-white rounded-full p-2 hover:bg-white/20 transition-colors">
            <span class="material-symbols-outlined text-[24px]">close</span>
        </button>
        <img id="lightbox-image" src="" class="max-w-full max-h-[90vh] object-contain rounded-xl shadow-2xl scale-95 transition-transform duration-300">
    </div>

    <script type="module" src="firebase-setup.js"></script>
    <script type="module" src="game-details.js"></script>
</body>
</html>
