<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LigaPH - Notifications</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a0e14" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LigaPH">
    <link rel="apple-touch-icon" href="assets/logo-192.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="global.css" />
    <script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 min-h-screen pb-32">

    <header class="fixed top-0 w-full z-50 bg-[#0a0e14] border-b border-outline-variant/10">
        <div class="flex justify-between items-center px-6 py-4 w-full max-w-2xl mx-auto">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="text-primary active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <h1 class="text-xl font-black italic tracking-tighter text-on-surface uppercase font-headline">Notifications</h1>
            </div>
            <button id="mark-all-read-btn" class="text-[10px] font-bold uppercase tracking-widest text-primary hover:text-primary-container transition-colors">
                Mark All Read
            </button>
        </div>
    </header>

    <main class="pt-24 pb-8 px-4 max-w-2xl mx-auto w-full">
        <div id="notifications-container" class="space-y-3">
            <div class="text-center py-10 animate-pulse text-outline">Loading...</div>
        </div>
    </main>

    <nav id="action-bar-container"></nav>
    <script type="module" src="sidebar.js"></script>
    <script type="module" src="action-bar.js"></script>
    <script type="module" src="firebase-setup.js"></script>
    <script type="module" src="notifications.js"></script>
</body>
</html>
