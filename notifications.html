<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta name="view-transition" content="same-origin" />
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Liga PH - Notifications</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="tailwind-theme.js"></script>
<link rel="stylesheet" href="global.css" />
<script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0a0e14] dark:bg-[#0a0e14] bg-gradient-to-b from-[#0f141a] to-transparent">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button id="menu-btn" class="text-[#ff8f6f] active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
<span class="material-symbols-outlined">menu</span>
</button>
<a href="feeds.html" class="text-2xl font-black italic tracking-tighter text-[#ff8f6f] uppercase font-headline hover:text-primary-container transition-colors">Liga PH</a>
</div>
</div>
</header>
<main class="pt-24 pb-28 px-4 max-w-lg mx-auto md:max-w-2xl lg:max-w-3xl w-full flex flex-col">
    <div class="flex justify-between items-end w-full mb-8 mt-4 md:mt-8 px-2">
        <h2 class="font-headline text-3xl md:text-5xl lg:text-6xl font-black italic tracking-tighter uppercase text-primary text-outline drop-shadow-md">Alerts</h2>
        <button id="mark-all-read-btn" class="text-primary text-sm font-bold hover:underline transition-all">Mark all read</button>
    </div>

    <!-- Content Area -->
    <div class="w-full px-2">
        <div id="notifications-container" class="flex flex-col gap-4">
            <!-- Notifications will be rendered here dynamically -->
            <div class="flex flex-col items-center justify-center py-12 text-center text-on-surface-variant bg-surface-container-low rounded-2xl border border-outline-variant/10">
                <span class="material-symbols-outlined text-6xl mb-4 opacity-50 animate-pulse">notifications</span>
                <p class="text-lg">Loading notifications...</p>
            </div>
        </div>
    </div>
</main>
<!-- Action Bar Shell -->
<nav id="action-bar-container"></nav>
<script type="module" src="sidebar.js"></script>
<script type="module" src="action-bar.js"></script>
<script type="module" src="notifications.js"></script>
</body>
</html>
