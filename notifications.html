<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Liga PH - Notifications</title>
    
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a0e14" />
    <link rel="apple-touch-icon" href="assets/logo-192.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="global.css" />
    <script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen pb-24 md:pb-0">

    <header class="fixed top-0 w-full z-50 bg-[#0a0e14] border-b border-outline-variant/10">
        <div class="flex justify-between items-center px-4 py-4 w-full max-w-3xl mx-auto">
            <div class="flex items-center gap-3">
                <button onclick="window.history.back()" class="text-on-surface-variant hover:text-primary transition-colors p-1">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <h1 class="font-headline text-xl font-black italic uppercase tracking-tighter text-on-surface">Notifications</h1>
            </div>
        </div>
    </header>

    <main class="pt-24 px-4 max-w-3xl mx-auto min-h-screen flex flex-col">
        
        <div class="flex justify-between items-center mb-6 border-b border-outline-variant/10 pb-4">
            <h2 class="font-headline text-2xl font-black italic uppercase tracking-tighter text-on-surface">Your Inbox</h2>
            <div class="flex gap-2">
                <button id="mark-all-read-btn" class="px-4 py-2 bg-primary/10 border border-primary/30 text-primary rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-primary hover:text-on-primary-container transition-colors shadow-sm hidden flex items-center gap-1.5 active:scale-95">
                    <span class="material-symbols-outlined text-[14px]">done_all</span> Read All
                </button>
                <button id="clear-all-btn" class="px-4 py-2 bg-error/10 border border-error/30 text-error rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-error hover:text-white transition-colors shadow-sm hidden flex items-center gap-1.5 active:scale-95">
                    <span class="material-symbols-outlined text-[14px]">delete_sweep</span> Clear All
                </button>
            </div>
        </div>

        <div id="notifications-container" class="space-y-3 flex-1 pb-10">
            <div class="flex flex-col items-center justify-center py-20 opacity-50">
                <span class="material-symbols-outlined animate-spin text-4xl text-primary mb-2">refresh</span>
                <p class="text-xs font-bold uppercase tracking-widest text-outline">Loading Inbox...</p>
            </div>
        </div>

    </main>

    <script type="module" src="firebase-setup.js"></script>
    <script type="module" src="notifications.js"></script>
</body>
</html>
