<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LigaPH - Game Listings</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="global.css" />
    <script type="module" src="route-guard.js"></script>
    <style>
        .listings-hero-bg {
            background-image: url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2090&auto=format&fit=crop');
            background-size: cover;
            background-position: center 30%;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary-container">

    <header class="fixed top-0 w-full z-50 bg-[#0a0e14] dark:bg-[#0a0e14] bg-gradient-to-b from-[#0f141a] to-transparent">
        <div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <button id="menu-btn" class="text-primary active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <a href="feeds.html" class="text-2xl font-black italic tracking-tighter text-primary uppercase font-headline hover:text-primary-container transition-colors">Liga PH</a>
            </div>
            <div class="flex items-center gap-6">
                <nav class="hidden md:flex gap-8 font-headline font-bold tracking-tight">
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="feeds.html">Feed</a>
                    <a class="text-primary hover:text-primary-container transition-colors duration-200" href="listings.html">Games</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="squads.html">Squads</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="profile.html">Profile</a>
                </nav>
                <a href="notifications.html" class="relative p-2 text-on-surface-variant hover:text-primary transition-colors rounded-full hover:bg-surface-container-highest active:scale-95 z-50">
                    <span class="material-symbols-outlined text-[28px]">notifications</span>
                    <span class="absolute top-2.5 right-2.5 w-2.5 h-2.5 bg-error rounded-full border-2 border-background"></span>
                </a>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-28 px-6 max-w-7xl mx-auto">
        <section class="mb-10 relative">
            
            <div class="absolute inset-0 rounded-3xl overflow-hidden listings-hero-bg shadow-2xl z-0">
                <div class="absolute inset-0 bg-gradient-to-r from-background via-background/90 to-background/20"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-background via-background/50 to-transparent"></div>
            </div>
            
            <div class="relative z-10 p-6 md:p-12">
                <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
                    <div class="max-w-xl">
                        <h2 class="font-headline text-5xl md:text-7xl font-black tracking-tighter uppercase leading-[0.9] mb-4 text-on-surface">
                            Find Your <br/><span class="text-primary italic">Arena.</span>
                        </h2>
                        <p class="text-on-surface-variant font-medium text-lg max-w-md">
                            Join high-intensity local pickup games or register for upcoming competitive leagues in your city.
                        </p>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                        <button id="filter-all-btn" class="bg-primary text-on-primary-container hover:brightness-110 transition-colors px-6 py-3.5 rounded-full flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(255,143,111,0.3)] active:scale-95">
                            <span class="material-symbols-outlined text-[20px]">public</span>
                            <span class="font-label text-sm font-black uppercase tracking-widest">All Games</span>
                        </button>
                        <button id="filter-mine-btn" class="bg-surface-container-highest/80 backdrop-blur-md text-on-surface hover:bg-surface-bright transition-colors px-6 py-3.5 rounded-full flex items-center justify-center gap-2 border border-outline-variant/30 active:scale-95">
                            <span class="material-symbols-outlined text-secondary text-[20px]">person</span>
                            <span class="font-label text-sm font-black uppercase tracking-widest">My Games</span>
                        </button>
                    </div>
                </div>

                <div class="relative group">
                    <div class="absolute inset-0 bg-primary/20 blur-2xl rounded-xl group-focus-within:bg-primary/30 transition-all duration-500"></div>
                    <div class="relative flex flex-col md:flex-row gap-2 bg-[#0a0e14]/90 backdrop-blur-xl p-2 rounded-xl border border-outline-variant/20 shadow-xl">
                        
                        <div class="flex-1 flex items-center px-4 py-3 gap-3">
                            <span class="material-symbols-outlined text-primary">location_on</span>
                            <select id="search-location" class="bg-transparent border-none focus:ring-0 w-full font-body text-on-surface appearance-none cursor-pointer outline-none">
                                <option value="" disabled selected hidden class="bg-surface-container-high text-on-surface">Location (e.g. Manila City)</option>
                                <option value="" class="bg-surface-container-high text-on-surface">All Locations</option>
                                </select>
                        </div>
                        
                        <div class="hidden md:block w-px h-8 bg-outline-variant/30 self-center"></div>
                        
                        <div class="flex-1 flex items-center px-4 py-3 gap-3">
                            <span class="material-symbols-outlined text-secondary">calendar_today</span>
                            <input id="search-date" class="bg-transparent border-none focus:ring-0 w-full font-body text-on-surface placeholder:text-outline/50 outline-none [color-scheme:dark] cursor-pointer" type="date"/>
                        </div>
                        
                        <div class="hidden md:block w-px h-8 bg-outline-variant/30 self-center"></div>
                        
                        <div class="flex-1 flex items-center px-4 py-3 gap-3">
                            <span class="material-symbols-outlined text-tertiary">bolt</span>
                            <select id="search-skill" class="bg-transparent border-none focus:ring-0 w-full font-body text-on-surface appearance-none cursor-pointer outline-none">
                                <option value="" class="bg-surface-container-high text-on-surface">All Skill Levels</option>
                                <option value="Novice" class="bg-surface-container-high text-on-surface">Novice</option>
                                <option value="Foundational" class="bg-surface-container-high text-on-surface">Foundational</option>
                                <option value="Intermediate" class="bg-surface-container-high text-on-surface">Intermediate</option>
                                <option value="Competitive" class="bg-surface-container-high text-on-surface">Competitive</option>
                                <option value="Elite" class="bg-surface-container-high text-on-surface">Elite</option>
                            </select>
                        </div>

                        <button class="bg-primary hover:brightness-110 text-on-primary-container px-10 py-4 rounded-lg font-headline font-black uppercase tracking-widest active:scale-95 transition-all shadow-lg">
                            Search
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <div class="flex gap-3 mb-12 overflow-x-auto hide-scrollbar pb-2">
            <button class="px-6 py-2 bg-primary text-on-primary-container rounded-md font-bold whitespace-nowrap shadow-sm hover:brightness-110 transition-all">All Games</button>
            <button class="px-6 py-2 bg-surface-container-high border border-outline-variant/20 hover:bg-surface-bright text-on-surface rounded-md font-bold whitespace-nowrap transition-all">Pickup</button>
            <button class="px-6 py-2 bg-surface-container-high border border-outline-variant/20 hover:bg-surface-bright text-on-surface rounded-md font-bold whitespace-nowrap transition-all">Leagues</button>
            <button class="px-6 py-2 bg-surface-container-high border border-outline-variant/20 hover:bg-surface-bright text-on-surface rounded-md font-bold whitespace-nowrap transition-all">Tournaments</button>
            <button class="px-6 py-2 bg-surface-container-high border border-outline-variant/20 hover:bg-surface-bright text-on-surface rounded-md font-bold whitespace-nowrap transition-all">Youth Programs</button>
        </div>

        <div id="games-container" class="grid grid-cols-1 md:grid-cols-12 gap-6 w-full">
            <div class="md:col-span-4 bg-surface-container-high rounded-xl p-6 flex flex-col justify-between animate-pulse border border-outline-variant/10">
                <div class="w-12 h-12 rounded-lg bg-surface-container-highest mb-6"></div>
                <div class="h-6 bg-surface-container-highest rounded w-3/4 mb-4"></div>
                <div class="h-4 bg-surface-container-highest rounded w-1/2 mb-6"></div>
                <div class="h-12 bg-surface-container-highest rounded-full w-full mt-4"></div>
            </div>
            <div class="md:col-span-4 bg-surface-container-high rounded-xl p-6 flex flex-col justify-between animate-pulse border border-outline-variant/10">
                <div class="w-12 h-12 rounded-lg bg-surface-container-highest mb-6"></div>
                <div class="h-6 bg-surface-container-highest rounded w-3/4 mb-4"></div>
                <div class="h-4 bg-surface-container-highest rounded w-1/2 mb-6"></div>
                <div class="h-12 bg-surface-container-highest rounded-full w-full mt-4"></div>
            </div>
            <div class="md:col-span-4 bg-surface-container-high rounded-xl p-6 flex flex-col justify-between animate-pulse border border-outline-variant/10">
                <div class="w-12 h-12 rounded-lg bg-surface-container-highest mb-6"></div>
                <div class="h-6 bg-surface-container-highest rounded w-3/4 mb-4"></div>
                <div class="h-4 bg-surface-container-highest rounded w-1/2 mb-6"></div>
                <div class="h-12 bg-surface-container-highest rounded-full w-full mt-4"></div>
            </div>
        </div>
    </main>

    <button id="create-btn" class="fixed bottom-24 right-4 md:right-8 w-14 h-14 bg-primary text-on-primary-container rounded-full shadow-[0_8px_32px_rgba(255,143,111,0.3)] flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-40">
        <span class="material-symbols-outlined text-3xl">add</span>
    </button>

    <div id="create-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface-container-high border border-outline-variant/20 rounded-2xl w-full max-w-sm mx-4 overflow-hidden transform scale-95 transition-transform duration-300 shadow-2xl flex flex-col max-h-[90vh]">
            <div class="flex justify-between items-center p-6 border-b border-outline-variant/10 shrink-0">
                <h3 id="modal-title" class="font-headline text-xl font-bold uppercase tracking-tight text-on-surface">Create New</h3>
                <button id="close-modal-btn" class="text-on-surface-variant hover:text-primary transition-colors p-1 rounded-full hover:bg-surface-bright">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            
            <div class="p-6 flex flex-col gap-4 overflow-y-auto custom-scrollbar flex-1">
                <form id="create-game-form" class="space-y-4">
                    <input type="hidden" id="edit-game-id" value="">
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Title</label>
                        <input id="game-title" type="text" required class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg px-4 py-3 text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" placeholder="e.g. 5v5 Full Court Pickup">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Location</label>
                        <input id="game-location" type="text" required class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg px-4 py-3 text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" placeholder="e.g. Cloverleaf Court">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Date</label>
                            <input id="game-date" type="date" required class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg px-4 py-3 text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors [color-scheme:dark]">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Time</label>
                            <input id="game-time" type="time" required class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg px-4 py-3 text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors [color-scheme:dark]">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Type</label>
                            <select id="game-type" class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg px-4 py-3 text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors appearance-none">
                                <option value="5v5">5v5</option>
                                <option value="4v4">4v4</option>
                                <option value="3v3">3v3</option>
                                <option value="Training">Training</option>
                                <option value="Tournament">Tournament</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Total Spots</label>
                            <input id="game-spots" type="number" min="2" max="50" required class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg px-4 py-3 text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" value="10">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Description (Optional)</label>
                        <textarea id="game-description" rows="3" class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg px-4 py-3 text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors resize-none" placeholder="Add details like skill level, court condition, etc."></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5">Cover Image (Optional)</label>
                        <input id="game-image" type="file" accept="image/*" class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-lg px-4 py-2 text-sm text-on-surface focus:border-primary focus:outline-none transition-colors file:mr-4 file:py-2.5 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:uppercase file:tracking-widest file:bg-primary/20 file:text-primary hover:file:bg-primary hover:file:text-on-primary-container cursor-pointer">
                    </div>
                    <div class="pt-4 pb-2">
                        <button type="submit" id="submit-game-btn" class="w-full bg-primary text-on-primary-container py-4 rounded-xl font-black uppercase text-sm tracking-widest hover:brightness-110 active:scale-95 transition-all shadow-lg">
                            Post Game
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="locations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const locationSelect = document.getElementById('search-location');
            if (locationSelect && window.metroManilaCities) {
                window.metroManilaCities.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    option.className = 'bg-surface-container-high text-on-surface';
                    locationSelect.appendChild(option);
                });
            }
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const createBtn = document.getElementById('create-btn');
            const modal = document.getElementById('create-modal');
            const closeBtn = document.getElementById('close-modal-btn');
            const modalContent = modal.querySelector('div');

            function openModal() {
                import('./firebase-setup.js').then(({ auth }) => {
                    const isLoggedIn = !!auth.currentUser;
                    if (!isLoggedIn) {
                        alert('Please log in to create a game.');
                        return;
                    }

                    const form = document.getElementById('create-game-form');
                    if (form) {
                        form.reset();
                        const modalTitle = document.getElementById('modal-title');
                        const submitBtn = document.getElementById('submit-game-btn');
                        const editGameId = document.getElementById('edit-game-id');

                        if (modalTitle) modalTitle.textContent = 'CREATE GAME';
                        if (submitBtn) submitBtn.textContent = 'POST GAME';
                        if (editGameId) editGameId.value = '';
                    }

                    modal.classList.remove('hidden');
                    setTimeout(() => {
                        modal.classList.remove('opacity-0', 'pointer-events-none');
                        modalContent.classList.remove('scale-95');
                        modalContent.classList.add('scale-100');
                        document.body.style.overflow = 'hidden';
                    }, 10);
                });
            }

            function closeModal() {
                modal.classList.add('opacity-0', 'pointer-events-none');
                modalContent.classList.remove('scale-100');
                modalContent.classList.add('scale-95');
                document.body.style.overflow = '';
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }

            if (createBtn) createBtn.addEventListener('click', openModal);
            if (closeBtn) closeBtn.addEventListener('click', closeModal);

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });
        });
    </script>

    <nav id="action-bar-container"></nav>
    <script type="module" src="sidebar.js"></script>
    <script type="module" src="action-bar.js"></script>
    <script type="module" src="firebase-setup.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="render-games.js"></script>
</body>
</html>
