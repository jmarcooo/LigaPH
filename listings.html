<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Liga PH - Open Games</title>
    
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a0e14" />
    <link rel="apple-touch-icon" href="assets/logo-192.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="global.css" />
    <script type="module" src="route-guard.js"></script>

    <style>
        /* Custom scrollbar to make filter row look sleek on desktop */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-24 md:pb-0 font-sans">

    <header class="fixed top-0 w-full z-50 bg-[#0a0e14] border-b border-outline-variant/10">
        <div class="flex justify-between items-center px-4 md:px-6 py-4 w-full max-w-7xl mx-auto">
            
            <div class="flex items-center gap-3 md:gap-4">
                <button id="menu-btn" class="text-primary active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <a href="home.html" class="text-2xl font-black italic tracking-tighter text-primary uppercase font-headline hover:text-primary-container transition-colors">Liga PH</a>
            </div>

            <div class="flex items-center gap-4 md:gap-6">
                <nav class="hidden md:flex gap-8 font-headline font-bold tracking-tight">
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="home.html">Home</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="feeds.html">Feed</a>
                    <a class="text-primary hover:text-primary transition-colors duration-200" href="listings.html">Games</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="squads.html">Squads</a>
                </nav>
                
                <div class="flex items-center gap-3">
                    <button id="desktop-search-btn" class="hidden md:flex p-2 text-on-surface-variant hover:text-primary transition-colors rounded-full hover:bg-surface-container-highest active:scale-95">
                        <span class="material-symbols-outlined text-[24px]">search</span>
                    </button>
                    
                    <a href="profile.html" class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant/30 hover:border-primary/50 transition-colors bg-surface-container shadow-sm shrink-0 active:scale-95">
                        <img id="global-header-avatar" src="https://ui-avatars.com/api/?name=P&background=20262f&color=ff8f6f" class="w-full h-full object-cover">
                    </a>

                    <a href="notifications.html" class="relative p-2 text-on-surface-variant hover:text-primary transition-colors rounded-full hover:bg-surface-container-highest active:scale-95 z-50">
                        <span class="material-symbols-outlined text-[26px]">notifications</span>
                        <span class="absolute top-2 right-2 w-2.5 h-2.5 bg-error rounded-full border-2 border-background hidden"></span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-20 px-4 md:px-6 max-w-7xl mx-auto min-h-screen flex flex-col pb-10">
        
        <div class="flex justify-between items-end mt-6 mb-2">
            <div>
                <h1 class="font-headline text-3xl md:text-5xl font-black italic uppercase tracking-tighter text-on-surface leading-none mb-1">Open Games</h1>
                <p class="text-xs md:text-sm text-outline font-medium tracking-wide">Find a run, lock in your spot, and hoop.</p>
            </div>
            <button onclick="window.openCreateGameModal()" class="hidden md:flex bg-primary hover:brightness-110 text-on-primary-container px-6 py-3 rounded-xl font-headline font-black uppercase text-sm tracking-widest shadow-[0_0_20px_rgba(255,143,111,0.2)] transition-all active:scale-95 items-center gap-2">
                <span class="material-symbols-outlined text-[20px]">add_circle</span> Host Game
            </button>
        </div>

        <div class="sticky top-[64px] md:top-[72px] z-30 bg-[#0a0e14]/95 backdrop-blur-xl pt-4 pb-4 border-b border-outline-variant/10 mb-6 flex flex-col md:flex-row gap-3 shadow-[0_10px_30px_-15px_rgba(0,0,0,0.5)]">
            
            <div class="relative flex-1">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">search</span>
                <input type="text" id="search-game-input" placeholder="Search court, host, or game title..." class="w-full bg-surface-container-highest border border-outline-variant/20 rounded-2xl py-3.5 pl-12 pr-4 text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant/50 shadow-inner">
            </div>

            <div class="flex gap-2 overflow-x-auto hide-scrollbar md:shrink-0 pb-1 md:pb-0">
                
                <div class="relative shrink-0">
                    <select id="filter-city" class="appearance-none bg-surface-container border border-outline-variant/20 hover:border-primary/50 rounded-2xl pl-4 pr-10 py-3.5 text-xs font-black uppercase tracking-widest text-on-surface focus:border-primary focus:ring-0 transition-colors shadow-sm cursor-pointer outline-none">
                        <option value="">Any City</option>
                        <option value="Makati">Makati</option>
                        <option value="Taguig">Taguig / BGC</option>
                        <option value="Quezon City">Quezon City</option>
                        <option value="Manila">Manila</option>
                        <option value="Pasig">Pasig</option>
                        <option value="Mandaluyong">Mandaluyong</option>
                        <option value="Muntinlupa">Muntinlupa</option>
                        <option value="Parañaque">Parañaque</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none text-[18px]">expand_more</span>
                </div>

                <div class="relative shrink-0">
                    <select id="filter-skill" class="appearance-none bg-surface-container border border-outline-variant/20 hover:border-primary/50 rounded-2xl pl-4 pr-10 py-3.5 text-xs font-black uppercase tracking-widest text-on-surface focus:border-primary focus:ring-0 transition-colors shadow-sm cursor-pointer outline-none">
                        <option value="">Any Skill</option>
                        <option value="Beginner">Beginner / Chill</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Competitive">Competitive / High</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none text-[18px]">expand_more</span>
                </div>

                <div class="relative shrink-0">
                    <select id="filter-type" class="appearance-none bg-surface-container border border-outline-variant/20 hover:border-primary/50 rounded-2xl pl-4 pr-10 py-3.5 text-xs font-black uppercase tracking-widest text-on-surface focus:border-primary focus:ring-0 transition-colors shadow-sm cursor-pointer outline-none">
                        <option value="">Any Type</option>
                        <option value="5v5">5v5 Full Court</option>
                        <option value="3v3">3v3 Half Court</option>
                        <option value="Shootaround">Shootaround</option>
                        <option value="Training">Training / Drills</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none text-[18px]">expand_more</span>
                </div>

                <button id="reset-filters-btn" class="hidden shrink-0 bg-error/10 text-error border border-error/30 hover:bg-error hover:text-white rounded-2xl px-4 py-3.5 text-xs font-black uppercase tracking-widest transition-colors flex items-center gap-1 shadow-sm">
                    <span class="material-symbols-outlined text-[16px]">close</span> Clear
                </button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4 px-1">
            <p id="results-counter" class="text-[10px] font-bold text-outline-variant uppercase tracking-widest">Loading games...</p>
        </div>

        <div id="games-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
            
            <div id="loading-indicator" class="col-span-full py-20 flex flex-col items-center justify-center">
                <span class="material-symbols-outlined animate-spin text-5xl text-primary mb-4 opacity-80">sports_basketball</span>
                <p class="text-xs font-black uppercase tracking-widest text-outline animate-pulse">Scouting local courts...</p>
            </div>
            
        </div>

        <button onclick="window.openCreateGameModal()" class="md:hidden fixed bottom-24 right-4 z-40 bg-primary text-on-primary-container w-16 h-16 rounded-full shadow-[0_4px_20px_rgba(255,143,111,0.4)] flex items-center justify-center active:scale-95 transition-transform border-2 border-[#0a0e14]">
            <span class="material-symbols-outlined text-[32px]">add</span>
        </button>

    </main>

    <div id="action-bar-container"></div>

    <div id="create-game-modal" class="fixed inset-0 bg-[#0a0e14]/90 backdrop-blur-md z-[100] hidden flex-col justify-end md:justify-center items-center opacity-0 transition-opacity duration-300">
        <div class="bg-surface-container rounded-t-3xl md:rounded-3xl w-full max-w-2xl max-h-[90vh] flex flex-col border border-outline-variant/20 shadow-2xl transform translate-y-full md:translate-y-0 md:scale-95 transition-transform duration-300">
            
            <div class="flex justify-between items-center p-5 md:p-6 border-b border-outline-variant/10">
                <h2 class="font-headline text-2xl font-black italic uppercase tracking-tighter text-on-surface">Host a Game</h2>
                <button id="close-create-modal" class="p-2 bg-surface-container-highest hover:bg-error/10 text-on-surface hover:text-error rounded-full transition-colors active:scale-95">
                    <span class="material-symbols-outlined text-[20px]">close</span>
                </button>
            </div>
            
            <div class="p-5 md:p-6 overflow-y-auto custom-scrollbar flex-1">
                <form id="create-game-form" class="space-y-5">
                    
                    <div>
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Game Title / Court Name</label>
                        <input type="text" id="game-title" required class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-colors" placeholder="e.g. Sunday Morning Runs @ BGC">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Date</label>
                            <input type="date" id="game-date" required class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-sm text-on-surface focus:border-primary transition-colors">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Start Time</label>
                            <input type="time" id="game-time" required class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-sm text-on-surface focus:border-primary transition-colors">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Location / City</label>
                        <input type="text" id="game-location" required class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-sm text-on-surface focus:border-primary transition-colors" placeholder="e.g. Kerry Sports, BGC">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Game Type</label>
                            <select id="game-type" class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-sm text-on-surface focus:border-primary transition-colors">
                                <option value="5v5">5v5 Full Court</option>
                                <option value="3v3">3v3 Half Court</option>
                                <option value="Shootaround">Shootaround</option>
                                <option value="Training">Training / Drills</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Skill Level</label>
                            <select id="game-skill" class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-sm text-on-surface focus:border-primary transition-colors">
                                <option value="All Levels">All Levels (Open)</option>
                                <option value="Beginner">Beginner / Chill</option>
                                <option value="Intermediate">Intermediate</option>
                                <option value="Competitive">Competitive / High</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Total Player Spots</label>
                            <input type="number" id="game-spots" required min="2" max="30" value="10" class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-sm text-on-surface focus:border-primary transition-colors">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Join Policy</label>
                            <select id="game-policy" class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-xl px-4 py-3 text-sm text-on-surface focus:border-primary transition-colors">
                                <option value="open">Open (Anyone can join)</option>
                                <option value="approval">Approval Required</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Court Image (Optional)</label>
                        <div class="flex items-center gap-4 bg-surface-container-highest border border-outline-variant/30 border-dashed rounded-xl p-4">
                            <label class="cursor-pointer bg-surface-variant hover:bg-surface-bright text-on-surface px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-colors flex items-center gap-2">
                                <span class="material-symbols-outlined text-[16px]">upload</span> Upload Image
                                <input type="file" id="game-image" accept="image/*" class="hidden">
                            </label>
                            <span id="game-image-name" class="text-xs text-outline-variant truncate max-w-[200px]">No file chosen</span>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="p-5 md:p-6 border-t border-outline-variant/10 bg-[#0a0e14] rounded-b-3xl">
                <button type="submit" form="create-game-form" id="submit-game-btn" class="w-full bg-primary hover:brightness-110 text-on-primary-container px-6 py-4 rounded-xl font-headline font-black uppercase tracking-widest transition-all shadow-md active:scale-95 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[20px]">public</span> Publish Game
                </button>
            </div>

        </div>
    </div>

    <script type="module" src="sidebar.js"></script>
    <script type="module" src="action-bar.js"></script>
    <script type="module" src="firebase-setup.js"></script>
    
    <script type="module" src="listings.js"></script>

    <script>
        window.openCreateGameModal = function() {
            const modal = document.getElementById('create-game-modal');
            const modalInner = modal.querySelector('div');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            // Auto-set date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('game-date').value = today;

            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalInner.classList.remove('translate-y-full', 'scale-95');
                modalInner.classList.add('translate-y-0', 'scale-100');
            }, 10);
        };

        document.getElementById('close-create-modal')?.addEventListener('click', () => {
            const modal = document.getElementById('create-game-modal');
            const modalInner = modal.querySelector('div');
            
            modal.classList.add('opacity-0');
            modalInner.classList.remove('translate-y-0', 'scale-100');
            modalInner.classList.add('translate-y-full', 'scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        });

        // Simple script to show chosen file name
        document.getElementById('game-image')?.addEventListener('change', function(e) {
            const nameLabel = document.getElementById('game-image-name');
            if (this.files && this.files[0]) {
                nameLabel.textContent = this.files[0].name;
                nameLabel.classList.add('text-primary');
            } else {
                nameLabel.textContent = "No file chosen";
                nameLabel.classList.remove('text-primary');
            }
        });

        // Basic Filter Reset Logic
        const filterIds = ['search-game-input', 'filter-city', 'filter-skill', 'filter-type'];
        const resetBtn = document.getElementById('reset-filters-btn');

        filterIds.forEach(id => {
            document.getElementById(id)?.addEventListener('input', checkFilters);
        });

        function checkFilters() {
            let isActive = false;
            filterIds.forEach(id => {
                const el = document.getElementById(id);
                if (el && el.value.trim() !== '') isActive = true;
            });
            
            if (isActive) {
                resetBtn.classList.remove('hidden');
                resetBtn.classList.add('flex');
            } else {
                resetBtn.classList.add('hidden');
                resetBtn.classList.remove('flex');
            }
        }

        resetBtn?.addEventListener('click', () => {
            filterIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            checkFilters();
            // Trigger an input event on the search to auto-refresh your listings.js logic
            document.getElementById('search-game-input').dispatchEvent(new Event('input')); 
        });
    </script>
</body>
</html>
