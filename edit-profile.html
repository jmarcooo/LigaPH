<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Liga PH - Edit Profile</title>
    
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a0e14" />
    <link rel="apple-touch-icon" href="assets/logo-192.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="global.css" />
    <script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen pb-24">

    <header class="fixed top-0 w-full z-50 bg-[#0a0e14] border-b border-outline-variant/10">
        <div class="flex justify-between items-center px-4 py-4 w-full max-w-3xl mx-auto">
            <div class="flex items-center gap-3">
                <button onclick="window.history.back()" class="text-on-surface-variant hover:text-primary transition-colors p-1">
                    <span class="material-symbols-outlined">close</span>
                </button>
                <h1 class="font-headline text-xl font-black italic uppercase tracking-tighter text-on-surface">Edit Profile</h1>
            </div>
        </div>
    </header>

    <main class="pt-24 px-4 max-w-3xl mx-auto">
        <form id="edit-profile-form" class="space-y-8">
            
            <div class="flex flex-col items-center justify-center p-6 border border-outline-variant/20 rounded-2xl bg-surface-container-low border-dashed">
                <div class="w-32 h-32 rounded-[2rem] bg-[#0a0e14] border-2 border-outline-variant/30 flex items-center justify-center overflow-hidden mb-4 relative group cursor-pointer shadow-lg" onclick="document.getElementById('avatar-input').click()">
                    <img id="edit-avatar-preview" src="" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/60 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="material-symbols-outlined text-white text-3xl">photo_camera</span>
                    </div>
                </div>
                <input type="file" id="avatar-input" accept="image/*" class="hidden">
                <button type="button" onclick="document.getElementById('avatar-input').click()" class="text-xs font-black uppercase tracking-widest text-primary hover:text-primary-container transition-colors bg-primary/10 px-5 py-2.5 rounded-full">
                    Change Avatar
                </button>
            </div>

            <div class="space-y-5 bg-surface-container-low p-6 rounded-2xl border border-outline-variant/10">
                <h3 class="text-xs font-black uppercase tracking-[0.2em] text-primary flex items-center gap-2 mb-2"><span class="w-4 h-[2px] bg-primary"></span> Basic Info</h3>
                
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-outline uppercase tracking-widest">Display Name</label>
                    <input type="text" id="displayName" required class="w-full bg-[#14171d] border border-outline-variant/30 rounded-lg p-3.5 text-sm text-on-surface focus:ring-primary focus:border-primary transition-all font-medium">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest">Primary Position</label>
                        <select id="primaryPosition" class="w-full bg-[#14171d] border border-outline-variant/30 text-on-surface text-sm rounded-lg focus:ring-primary focus:border-primary p-3.5 transition-colors appearance-none font-medium">
                            <option value="PG">Point Guard (PG)</option>
                            <option value="SG">Shooting Guard (SG)</option>
                            <option value="SF">Small Forward (SF)</option>
                            <option value="PF">Power Forward (PF)</option>
                            <option value="C">Center (C)</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest">Skill Level</label>
                        <select id="edit-skill" class="w-full bg-[#14171d] border border-outline-variant/30 text-on-surface text-sm rounded-lg focus:ring-primary focus:border-primary p-3.5 transition-colors appearance-none font-medium">
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Advanced">Advanced</option>
                            <option value="Elite">Elite</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest">City Base</label>
                        <select id="edit-location" class="w-full bg-[#14171d] border border-outline-variant/30 text-on-surface text-sm rounded-lg focus:ring-primary focus:border-primary p-3.5 transition-colors appearance-none font-medium">
                            <option value="" disabled selected>Select your city...</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest">Home Court</label>
                        <input type="text" id="homeCourt" list="verified-courts-list" placeholder="Search verified courts..." class="w-full bg-[#14171d] border border-outline-variant/30 rounded-lg p-3.5 text-sm text-on-surface focus:ring-primary focus:border-primary transition-all font-medium">
                        <datalist id="verified-courts-list"></datalist>
                        <div class="text-right">
                            <button type="button" onclick="window.openSuggestCourtModal()" class="text-[10px] font-bold text-primary hover:text-primary-container transition-colors underline">Don't see your court? Suggest one.</button>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-secondary uppercase tracking-widest">Account Role (Admin/Test)</label>
                    <select id="accountType" class="w-full bg-[#14171d] border border-secondary/30 text-on-surface text-sm rounded-lg focus:ring-secondary focus:border-secondary p-3.5 transition-colors appearance-none font-medium">
                        <option value="Player">Player</option>
                        <option value="Verified">Verified Player</option>
                        <option value="Organizer">Organizer</option>
                        <option value="Referee">Referee</option>
                        <option value="Official">Official</option>
                        <option value="Content Writer">Content Writer</option>
                        <option value="Editor">Editor</option>
                        <option value="Administrator">Administrator</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-outline uppercase tracking-widest">Bio / Playing Style</label>
                    <textarea id="bio" rows="3" placeholder="Pass-first point guard. Love playing defense." class="w-full bg-[#14171d] border border-outline-variant/30 rounded-lg p-3.5 text-sm text-on-surface focus:ring-primary focus:border-primary transition-all font-medium resize-none"></textarea>
                </div>
            </div>

            <div class="space-y-6 bg-surface-container-low p-6 rounded-2xl border border-outline-variant/10">
                <div class="flex justify-between items-end mb-2">
                    <h3 class="text-xs font-black uppercase tracking-[0.2em] text-secondary flex items-center gap-2"><span class="w-4 h-[2px] bg-secondary"></span> Self Assessment</h3>
                    <span class="text-[9px] text-outline font-bold uppercase tracking-widest">1 (Novice) - 5 (Pro)</span>
                </div>
                
                <div class="space-y-5">
                    <div>
                        <div class="flex justify-between mb-1.5"><span class="text-[10px] font-bold uppercase tracking-widest text-on-surface">Shooting</span><span id="val-shooting" class="text-xs font-black text-secondary">3</span></div>
                        <input type="range" id="self-shooting" min="1" max="5" value="3" class="w-full accent-secondary h-1.5 bg-surface-container-highest rounded-lg appearance-none cursor-pointer">
                    </div>
                    <div>
                        <div class="flex justify-between mb-1.5"><span class="text-[10px] font-bold uppercase tracking-widest text-on-surface">Passing</span><span id="val-passing" class="text-xs font-black text-secondary">3</span></div>
                        <input type="range" id="self-passing" min="1" max="5" value="3" class="w-full accent-secondary h-1.5 bg-surface-container-highest rounded-lg appearance-none cursor-pointer">
                    </div>
                    <div>
                        <div class="flex justify-between mb-1.5"><span class="text-[10px] font-bold uppercase tracking-widest text-on-surface">Dribbling</span><span id="val-dribbling" class="text-xs font-black text-secondary">3</span></div>
                        <input type="range" id="self-dribbling" min="1" max="5" value="3" class="w-full accent-secondary h-1.5 bg-surface-container-highest rounded-lg appearance-none cursor-pointer">
                    </div>
                    <div>
                        <div class="flex justify-between mb-1.5"><span class="text-[10px] font-bold uppercase tracking-widest text-on-surface">Rebounding</span><span id="val-rebounding" class="text-xs font-black text-secondary">3</span></div>
                        <input type="range" id="self-rebounding" min="1" max="5" value="3" class="w-full accent-secondary h-1.5 bg-surface-container-highest rounded-lg appearance-none cursor-pointer">
                    </div>
                    <div>
                        <div class="flex justify-between mb-1.5"><span class="text-[10px] font-bold uppercase tracking-widest text-on-surface">Defense</span><span id="val-defense" class="text-xs font-black text-secondary">3</span></div>
                        <input type="range" id="self-defense" min="1" max="5" value="3" class="w-full accent-secondary h-1.5 bg-surface-container-highest rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-primary hover:brightness-110 text-on-primary-container px-6 py-4 rounded-xl font-headline font-black uppercase tracking-widest transition-all shadow-lg active:scale-95 text-sm flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-[20px]">save</span> Save Changes
            </button>
        </form>
    </main>

    <div id="suggest-court-modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-surface-container-high border border-outline-variant/20 rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl scale-95 transition-transform duration-300 flex flex-col">
            <div class="p-6 border-b border-outline-variant/10 flex justify-between items-center shrink-0">
                <h2 class="font-headline text-xl font-black italic uppercase tracking-tighter text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined">add_location</span> Suggest Court
                </h2>
                <button id="close-suggest-modal" type="button" class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-container-highest">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6">
                <form id="suggest-court-form" class="space-y-4">
                    <p class="text-xs text-on-surface-variant mb-4">Help grow the community! Suggest a court and our admins will verify it.</p>
                    <div>
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">City</label>
                        <select id="suggest-city" required class="w-full bg-[#0a0e14] border border-outline-variant/30 rounded-xl p-3 text-sm text-on-surface focus:ring-primary focus:border-primary transition-all font-medium appearance-none">
                            <option value="" disabled selected>Select City...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-outline uppercase tracking-widest mb-1.5">Court Name</label>
                        <input type="text" id="suggest-name" required placeholder="e.g. Titan Love Court, BGC" class="w-full bg-[#0a0e14] border border-outline-variant/30 rounded-xl p-3 text-sm text-on-surface focus:ring-primary focus:border-primary transition-all font-medium">
                    </div>
                    <button type="submit" id="submit-suggest-btn" class="w-full mt-2 bg-primary hover:brightness-110 text-on-primary-container py-3 rounded-xl font-black text-xs uppercase tracking-widest transition-all shadow-md active:scale-95">Submit for Review</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="firebase-setup.js"></script>
    <script type="module" src="locations.js"></script>
    <script type="module" src="profile.js"></script>
</body>
</html>
