<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        }

            background: rgba(32, 38, 47, 0.6);
            backdrop-filter: blur(20px);

<body class="bg-background text-on-background font-body antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0a0e14] dark:bg-[#0a0e14] bg-gradient-to-b from-[#0f141a] to-transparent">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button id="menu-btn" class="text-[#ff8f6f] active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
<span class="material-symbols-outlined">menu</span>
</button>
<span class="text-2xl font-black italic tracking-tighter text-[#ff8f6f] uppercase font-headline">Liga PH</span>
</div>
<div class="flex items-center gap-6">
<nav class="hidden md:flex gap-8 font-headline font-bold tracking-tight">
<a class="text-[#a8abb3] hover:text-[#ff7851] transition-colors duration-200" href="feeds.html">Feed</a>
<a class="text-[#a8abb3] hover:text-[#ff7851] transition-colors duration-200" href="listings.html">Games</a>
<a class="text-[#a8abb3] hover:text-[#ff7851] transition-colors duration-200" href="squads.html">Squads</a>
<a class="text-[#a8abb3] hover:text-[#ff7851] transition-colors duration-200" href="profile.html">Profile</a>
</nav>
<a href="profile.html" class="block w-10 h-10 rounded-full overflow-hidden border-2 border-primary hover:border-primary-fixed-dim transition-colors active:scale-95">
<img alt="User profile" class="w-full h-full object-cover" data-alt="close-up portrait of a young athletic man with a confident expression in cinematic urban lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4xEx32oW2W6t08XTsDz-QyYMAlcDLnVVwe-lI-ou6rKuiLBjtoGesccKu_3fIZddCHjKjbkv5--Dw9ht6dsnC1B_IGmjOLbwqr18zgXuRZ7XCod5rC2um6ApFj-HeGJ9rHGLKTnGnF_oe_nSP5F2L5PuRGe-LeupfRGQMIauo4N12_rMAOq3-6jfFMtzBuAc1kC1aMEkn0dUqWdsSc94_u_fYRRigqDa3sSPCaYE4jH9midOwLvgGZzmtlmETgwFg1ObiFshTs6U"/>
</a>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-4 md:px-8 max-w-7xl mx-auto">
    <section class="max-w-3xl mx-auto bg-surface-container-low rounded-xl border border-outline-variant/10 p-6 md:p-10 shadow-lg">
        <div class="flex items-center gap-4 mb-8">
            <a href="profile.html" class="text-on-surface-variant hover:text-primary transition-colors p-2 rounded-full active:scale-95 bg-surface-container">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="font-headline text-3xl md:text-4xl font-black italic tracking-tighter uppercase text-primary">Edit Profile</h1>
        </div>

        <form action="profile.html" class="space-y-6">
            <!-- Avatar Section -->
            <div class="flex flex-col items-center gap-4 mb-8 pb-8 border-b border-outline-variant/10">
                <div class="relative group">
                    <img class="w-32 h-32 rounded-full object-cover border-4 border-surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDVQDIWBa8RyRxduxXgDFZNhgT9yVz33PqBTE8sfbmoec_Tq44Ywx1Sc9Fc2GG7wnn1JrhvbJLqGeZCJbksoCjokE94YkPKWDw56BUHZtgDzyqENLIUR5DYRnwZfEBHiv1b9JH0K3U70le5mgkAzKrNAK0pdXdvd18Y6XOFz-ANiTe_GrM2pfgJkwHUE_RZhFnEo1rlfMniE4njB925qvo71N2W4U5n6j5CcEsrP2r6BOzsInWBeWDr4NleKuPqfJ8GZgFYiFqbZp8" alt="Profile avatar">
                    <div class="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                        <span class="material-symbols-outlined text-white">photo_camera</span>
                    </div>
                </div>
                <button type="button" class="text-sm font-bold text-primary uppercase tracking-widest hover:text-primary-container transition-colors">Change Photo</button>
            </div>

            <!-- Form Fields -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="col-span-1 md:col-span-2 space-y-2">
                    <label for="displayName" class="block text-xs font-bold text-on-surface uppercase tracking-widest">Display Name</label>
                    <input type="text" id="displayName" value="MARCUS R." class="w-full bg-surface border border-outline-variant/30 text-on-surface text-sm rounded-lg focus:ring-primary focus:border-primary block p-3 placeholder-on-surface-variant/50 transition-colors" required>
                </div>

                <div class="space-y-2">
                    <label for="primaryPosition" class="block text-xs font-bold text-on-surface uppercase tracking-widest">Primary Position</label>
                    <select id="primaryPosition" class="w-full bg-surface border border-outline-variant/30 text-on-surface text-sm rounded-lg focus:ring-primary focus:border-primary block p-3 transition-colors">
                        <option value="PG" selected>Point Guard (PG)</option>
                        <option value="SG">Shooting Guard (SG)</option>
                        <option value="SF">Small Forward (SF)</option>
                        <option value="PF">Power Forward (PF)</option>
                        <option value="C">Center (C)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label for="homeCourt" class="block text-xs font-bold text-on-surface uppercase tracking-widest">Home Court</label>
                    <input type="text" id="homeCourt" value="DOWNTOWN COURT" class="w-full bg-surface border border-outline-variant/30 text-on-surface text-sm rounded-lg focus:ring-primary focus:border-primary block p-3 placeholder-on-surface-variant/50 transition-colors">
                </div>

                <div class="col-span-1 md:col-span-2 space-y-2">
                    <label for="bio" class="block text-xs font-bold text-on-surface uppercase tracking-widest">Player Bio</label>
                    <textarea id="bio" rows="4" class="w-full bg-surface border border-outline-variant/30 text-on-surface text-sm rounded-lg focus:ring-primary focus:border-primary block p-3 placeholder-on-surface-variant/50 transition-colors">Point guard focused on high-intensity street play. Always looking for competitive full-court runs and tactical league matchups in the downtown area.</textarea>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row justify-end gap-4 pt-8 mt-8 border-t border-outline-variant/10">
                <a href="profile.html" class="px-6 py-3 rounded-full text-center text-sm font-bold uppercase tracking-widest text-on-surface-variant bg-surface-container hover:bg-surface-bright transition-colors">
                    Cancel
                </a>
                <button type="submit" class="px-8 py-3 rounded-full text-center text-sm font-black uppercase tracking-widest text-on-primary bg-primary hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all active:scale-95">
                    Save Changes
                </button>
            </div>
        </form>
    </section>
</main>

<script src="sidebar.js"></script>
<script src="action-bar.js"></script>
</body></html>
