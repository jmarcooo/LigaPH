<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta name="view-transition" content="same-origin" />
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Liga PH - Players</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="tailwind-theme.js"></script>
<link rel="stylesheet" href="global.css" />
<script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0a0e14] dark:bg-[#0a0e14] bg-gradient-to-b from-[#0f141a] to-transparent">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button id="menu-btn" class="text-[#ff8f6f] active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
<span class="material-symbols-outlined">menu</span>
</button>
<a href="feeds.html" class="hover:opacity-80 transition-opacity"><img src="assets/logo.png" alt="Liga PH Logo" class="h-6 object-contain"></a>
</div>
</div>
</header>
<main class="pt-24 pb-28 px-4 max-w-lg mx-auto md:max-w-4xl lg:max-w-6xl w-full flex flex-col items-center">
    <div class="flex justify-between items-end w-full mb-6 mt-4 md:mt-8 px-2 max-w-lg md:max-w-3xl lg:max-w-4xl">
        <h2 class="font-headline text-3xl md:text-5xl lg:text-6xl font-black italic tracking-tighter uppercase text-primary text-outline drop-shadow-md">Players</h2>
    </div>

    <!-- Top 10 Players Section -->
    <section class="w-full max-w-lg md:max-w-3xl lg:max-w-4xl px-2 mb-12" id="top-players-section">
        <h2 class="text-sm font-bold tracking-[0.2em] text-primary uppercase mb-6 flex items-center gap-2">
            <span class="w-8 h-[2px] bg-primary"></span> Top 10 Players
        </h2>
        <div class="relative w-full overflow-hidden">
            <div id="top-players-container" class="flex gap-4 overflow-x-auto pb-6 snap-x snap-mandatory hide-scrollbar">
                <!-- Top players will be rendered here dynamically -->
                <div class="flex-none w-64 snap-start flex flex-col items-center justify-center py-8 text-center text-on-surface-variant bg-surface-container-low rounded-xl border border-outline-variant/10">
                    <span class="material-symbols-outlined text-4xl mb-2 opacity-50 animate-pulse">star</span>
                    <p class="text-sm">Loading top players...</p>
                </div>
            </div>

            <!-- Optional scroll indicators -->
            <div class="absolute right-0 top-0 bottom-6 w-12 bg-gradient-to-l from-background to-transparent pointer-events-none md:hidden"></div>
        </div>
    </section>

    <!-- Search & Filter Area -->
    <div class="w-full max-w-lg md:max-w-3xl lg:max-w-4xl px-2 mb-6 flex flex-col sm:flex-row gap-3">
        <div class="relative flex-1">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
            <input id="player-search-input" class="w-full bg-surface-container rounded-full py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-primary border-none text-on-surface font-medium placeholder:text-on-surface-variant/70 shadow-inner" placeholder="Search players by name..." type="text"/>
        </div>

        <!-- Position Filter -->
        <div class="relative shrink-0">
            <select id="player-position-filter" class="w-full sm:w-auto appearance-none bg-surface-container rounded-full py-3 pl-4 pr-10 focus:outline-none focus:ring-2 focus:ring-primary border-none text-on-surface font-medium shadow-inner cursor-pointer">
                <option value="">All Positions</option>
                <option value="PG">Point Guard (PG)</option>
                <option value="SG">Shooting Guard (SG)</option>
                <option value="SF">Small Forward (SF)</option>
                <option value="PF">Power Forward (PF)</option>
                <option value="C">Center (C)</option>
            </select>
            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">arrow_drop_down</span>
        </div>
    </div>

    <!-- Content Area -->
    <div class="w-full max-w-lg md:max-w-3xl lg:max-w-4xl px-2">
        <div id="players-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="col-span-full flex flex-col items-center justify-center py-12 text-center text-on-surface-variant">
                <span class="material-symbols-outlined text-6xl mb-4 opacity-50 animate-pulse">groups</span>
                <p class="text-lg">Loading players...</p>
            </div>
        </div>
    </div>
</main>
<!-- Action Bar Shell -->
<nav id="action-bar-container"></nav>
<script type="module" src="sidebar.js"></script>
<script type="module" src="action-bar.js"></script>
<script type="module" src="players.js"></script>
</body>
</html>
