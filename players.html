<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Liga PH - Players</title>
    
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0a0e14" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LigaPH">
    <link rel="apple-touch-icon" href="assets/logo-192.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="global.css" />
    <script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-background min-h-screen pb-32 selection:bg-primary/30">

    <header class="fixed top-0 w-full z-50 bg-[#0a0e14] dark:bg-[#0a0e14] bg-gradient-to-b from-[#0f141a] to-transparent">
        <div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <button id="menu-btn" class="text-primary active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <a href="home.html" class="text-2xl font-black italic tracking-tighter text-primary uppercase font-headline hover:text-primary-container transition-colors">Liga PH</a>
            </div>
            <div class="flex items-center gap-6">
                <nav class="hidden md:flex gap-8 font-headline font-bold tracking-tight">
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="home.html">Home</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="feeds.html">Feed</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="listings.html">Games</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="squads.html">Squads</a>
                    <a class="text-on-surface-variant hover:text-primary transition-colors duration-200" href="profile.html">Profile</a>
                </nav>
                <a href="notifications.html" class="relative p-2 text-on-surface-variant hover:text-primary transition-colors rounded-full hover:bg-surface-container-highest active:scale-95 z-50">
                    <span class="material-symbols-outlined text-[28px]">notifications</span>
                    <span class="absolute top-2.5 right-2.5 w-2.5 h-2.5 bg-error rounded-full border-2 border-background hidden"></span>
                </a>
            </div>
        </div>
    </header>

    <main class="pt-24 px-4 md:px-6 max-w-7xl mx-auto w-full">
        
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-6">
            <h2 class="font-headline text-2xl font-black italic text-on-surface uppercase tracking-tighter">
                Players
            </h2>
            
            <div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto">
                <div class="relative w-full sm:w-64">
                    <input type="text" id="player-search-input" placeholder="Search players..." class="w-full bg-[#14171d] border border-outline-variant/30 rounded-lg pl-10 pr-4 py-2.5 text-sm text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors shadow-sm">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant pointer-events-none text-[18px]">search</span>
                </div>
                
                <div class="flex w-full sm:w-auto gap-3">
                    <div class="relative w-full sm:w-40">
                        <select id="player-location-filter" class="w-full bg-[#14171d] border border-outline-variant/30 rounded-lg pl-4 pr-10 py-2.5 text-[10px] font-black uppercase tracking-widest text-primary focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors appearance-none cursor-pointer shadow-sm">
                            <option value="Metro Manila">Metro Manila</option>
                        </select>
                        <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-primary pointer-events-none text-[18px]">expand_more</span>
                    </div>

                    <div class="relative w-full sm:w-40">
                        <select id="player-position-filter" class="w-full bg-[#14171d] border border-outline-variant/30 rounded-lg pl-4 pr-10 py-2.5 text-[10px] font-black uppercase tracking-widest text-secondary focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors appearance-none cursor-pointer shadow-sm">
                            <option value="">All Positions</option>
                            <option value="PG">Point Guard</option>
                            <option value="SG">Shooting Guard</option>
                            <option value="SF">Small Forward</option>
                            <option value="PF">Power Forward</option>
                            <option value="C">Center</option>
                        </select>
                        <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-secondary pointer-events-none text-[18px]">expand_more</span>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="font-headline text-sm font-black text-on-surface uppercase tracking-[0.2em] flex items-center gap-3 mb-4">
            <span class="w-8 h-[2px] bg-tertiary"></span> My Profile
        </h2>
        <div id="my-profile-container" class="mb-10">
            <div class="bg-[#14171d] rounded-2xl p-5 border border-outline-variant/10 shadow-sm animate-pulse h-24"></div>
        </div>

        <h2 class="font-headline text-sm font-black text-on-surface uppercase tracking-[0.2em] flex items-center gap-3 mb-4">
            <span class="w-8 h-[2px] bg-primary"></span> Top 3 Players
        </h2>
        <div id="top-players-container" class="mb-12">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2 bg-[#14171d] rounded-3xl p-6 md:p-8 border border-outline-variant/10 shadow-lg flex flex-col sm:flex-row items-center sm:items-center gap-5 md:gap-6 animate-pulse">
                    <div class="w-24 h-24 md:w-32 md:h-32 rounded-full bg-surface-container-highest shrink-0"></div>
                    <div class="flex-1 w-full space-y-4">
                        <div class="h-6 w-32 bg-surface-container-highest rounded mx-auto sm:mx-0"></div>
                        <div class="h-10 w-3/4 bg-surface-container-highest rounded mx-auto sm:mx-0"></div>
                    </div>
                </div>
            </div>
        </div>

        <h2 class="font-headline text-sm font-black text-on-surface uppercase tracking-[0.2em] flex items-center gap-3 mb-6">
            <span class="w-8 h-[2px] bg-secondary"></span> The League Roster
        </h2>
        <div id="players-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 pb-12">
            <div class="bg-[#14171d] rounded-2xl p-5 border border-outline-variant/10 shadow-sm animate-pulse h-32"></div>
            <div class="bg-[#14171d] rounded-2xl p-5 border border-outline-variant/10 shadow-sm animate-pulse h-32 hidden md:block"></div>
            <div class="bg-[#14171d] rounded-2xl p-5 border border-outline-variant/10 shadow-sm animate-pulse h-32 hidden lg:block"></div>
        </div>

    </main>

    <nav id="action-bar-container"></nav>
    
    <script src="locations.js"></script>
    <script type="module" src="sidebar.js"></script>
    <script type="module" src="action-bar.js"></script>
    <script type="module" src="firebase-setup.js"></script>
    <script type="module" src="players.js"></script>
</body>
</html>
