<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta name="view-transition" content="same-origin" />
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Liga PH - Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&amp;family=Be+Vietnam+Pro:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="tailwind-theme.js"></script>
    <link rel="stylesheet" href="global.css" />
    <script type="module" src="route-guard.js"></script>
</head>
<body class="bg-background text-on-background font-body antialiased">
    <header class="fixed top-0 w-full z-50 bg-[#0a0e14] dark:bg-[#0a0e14] bg-gradient-to-b from-[#0f141a] to-transparent">
        <div class="flex justify-between items-center px-6 py-4 w-full">
            <div class="flex items-center gap-4">
                <button id="menu-btn" class="text-[#ff8f6f] active:scale-95 transition-transform duration-150 p-2 -ml-2 rounded-full hover:bg-primary/10">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <a href="feeds.html" class="text-2xl font-black italic tracking-tighter text-[#ff8f6f] uppercase font-headline hover:text-primary-container transition-colors">Liga PH</a>
            </div>
            <div class="flex items-center gap-6">
                <nav class="hidden md:flex gap-8 font-headline font-bold tracking-tight">
                    <a class="text-[#a8abb3] hover:text-[#ff7851] transition-colors duration-200" href="feeds.html">Feed</a>
                    <a class="text-[#a8abb3] hover:text-[#ff7851] transition-colors duration-200" href="listings.html">Games</a>
                    <a class="text-[#a8abb3] hover:text-[#ff7851] transition-colors duration-200" href="squads.html">Squads</a>
                    <a class="text-[#a8abb3] hover:text-[#ff7851] transition-colors duration-200" href="profile.html">Profile</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-32 px-4 md:px-8 max-w-7xl mx-auto">
        <section class="relative mb-12">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-end">
                <div class="lg:col-span-8 flex flex-col md:flex-row gap-8 items-center md:items-start">
                    <div class="relative group shrink-0">
                        <div class="absolute -inset-1 bg-kinetic-gradient rounded-xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                        <div id="profile-avatar-container" class="relative w-40 h-40 md:w-56 md:h-56 rounded-xl overflow-hidden bg-surface-container-highest animate-pulse"><img id="profile-avatar" class="w-full h-full object-cover hidden" alt="Profile Avatar" src=""/></div>
                    </div>
                    <div class="flex-1 text-center md:text-left w-full">
                        <h1 id="profile-name" class="font-headline text-4xl md:text-6xl font-black italic tracking-tighter uppercase text-primary mb-2 min-h-[3rem] md:min-h-[4rem] min-w-[200px] animate-pulse bg-surface-container-high rounded-md inline-block"></h1>
                        <p id="profile-bio" class="text-on-surface-variant max-w-md text-sm md:text-base leading-relaxed mb-4 min-h-[3rem] animate-pulse bg-surface-container-high rounded-md w-full mx-auto md:mx-0"></p>
                        
                        <div class="flex flex-wrap justify-center md:justify-start gap-2 mb-6">
                            <span id="profile-home-court" class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-md font-bold text-xs uppercase tracking-tight min-w-[120px] min-h-[24px] inline-block animate-pulse"></span>
                            <span id="profile-position" class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-md font-bold text-xs uppercase tracking-tight min-w-[100px] min-h-[24px] inline-block animate-pulse"></span>
                        </div>

                        <div class="grid grid-cols-3 gap-2 md:gap-4 w-full max-w-md mx-auto md:mx-0">
                            <div class="bg-surface-container-high p-3 rounded-xl text-center border border-outline-variant/10 shadow-sm">
                                <span id="stat-connections" class="block text-xl md:text-2xl font-black text-primary animate-pulse bg-surface-container-highest h-8 w-12 mx-auto rounded"></span>
                                <span class="text-[9px] md:text-[10px] text-outline uppercase tracking-widest font-bold mt-1 block">Connections</span>
                            </div>
                            <div class="bg-surface-container-high p-3 rounded-xl text-center border border-outline-variant/10 shadow-sm">
                                <span id="stat-commendations" class="block text-xl md:text-2xl font-black text-secondary animate-pulse bg-surface-container-highest h-8 w-12 mx-auto rounded"></span>
                                <span class="text-[9px] md:text-[10px] text-outline uppercase tracking-widest font-bold mt-1 block">Commends</span>
                            </div>
                            <div class="bg-surface-container-high p-3 rounded-xl text-center border border-outline-variant/10 shadow-sm">
                                <span id="stat-reliability" class="block text-xl md:text-2xl font-black text-tertiary animate-pulse bg-surface-container-highest h-8 w-16 mx-auto rounded"></span>
                                <span class="text-[9px] md:text-[10px] text-outline uppercase tracking-widest font-bold mt-1 block">Reliability</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-4 w-full flex flex-col gap-3">
                    <a href="edit-profile.html" id="manage-profile-btn" class="hidden bg-surface-container-high border border-outline-variant/30 hover:bg-surface-container-highest p-6 rounded-lg flex items-center justify-between group cursor-pointer active:scale-95 transition-all shadow-sm">
                        <div>
                            <span class="block text-on-surface font-headline font-bold text-xl uppercase italic">Manage Profile</span>
                            <span class="text-on-surface-variant text-xs font-bold uppercase tracking-wider">Edit your details</span>
                        </div>
                        <span class="material-symbols-outlined text-primary text-3xl">edit</span>
                    </a>

                    <button id="rate-player-btn" class="hidden w-full bg-primary/10 border border-primary/30 hover:bg-primary/20 p-5 rounded-lg flex items-center justify-between group cursor-pointer active:scale-95 transition-all shadow-sm">
                        <div class="text-left">
                            <span class="block text-primary font-headline font-bold text-lg uppercase italic">Scout Player</span>
                            <span id="rate-player-subtitle" class="text-primary/70 text-[10px] font-bold uppercase tracking-wider">Evaluate their skills</span>
                        </div>
                        <span class="material-symbols-outlined text-primary text-2xl">star_rate</span>
                    </button>

                    <button id="commend-player-btn" class="hidden w-full bg-secondary/10 border border-secondary/30 hover:bg-secondary/20 p-5 rounded-lg flex items-center justify-between group cursor-pointer active:scale-95 transition-all shadow-sm">
                        <div class="text-left">
                            <span class="block text-secondary font-headline font-bold text-lg uppercase italic">Commend Player</span>
                            <span id="commend-player-subtitle" class="text-secondary/70 text-[10px] font-bold uppercase tracking-wider">Give them props</span>
                        </div>
                        <span class="material-symbols-outlined text-secondary text-2xl">thumb_up</span>
                    </button>
                </div>
            </div>
        </section>

        <div class="flex gap-6 border-b border-outline-variant/10 mb-8 overflow-x-auto hide-scrollbar px-2">
            <button id="tab-games" class="pb-4 border-b-2 border-primary text-primary font-bold uppercase tracking-widest text-sm transition-colors shrink-0">Active Games</button>
            <button id="tab-posts" class="pb-4 border-b-2 border-transparent text-on-surface-variant hover:text-on-surface font-bold uppercase tracking-widest text-sm transition-colors shrink-0">Timeline Posts</button>
        </div>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div id="view-games" class="space-y-4">
                    <div id="profile-games-container" class="space-y-4 flex flex-col items-center justify-center py-8 text-center text-on-surface-variant">
                        <span class="material-symbols-outlined text-4xl mb-2 opacity-50 animate-pulse">sports_basketball</span>
                        <span class="block">Loading games...</span>
                    </div>
                </div>
                <div id="view-posts" class="hidden space-y-6">
                    <div id="profile-posts-container" class="space-y-6 flex flex-col items-center justify-center py-8 text-center text-on-surface-variant">
                        <span class="material-symbols-outlined text-4xl mb-2 opacity-50 animate-pulse">dynamic_feed</span>
                        <span class="block">Loading posts...</span>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <div class="bg-surface-container-low p-8 rounded-lg border border-outline-variant/10">
                    <h2 class="font-headline text-2xl font-black italic tracking-tighter uppercase text-on-surface mb-6">Player Stats</h2>
                    
                    <div class="mb-8">
                        <h3 class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest mb-4 border-b border-outline-variant/10 pb-2">Self Assessment</h3>
                        <div id="self-skill-breakdown" class="space-y-5">
                            <div class="animate-pulse bg-surface-container-highest h-4 w-full rounded"></div>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-4 border-b border-outline-variant/10 pb-2">
                            <h3 class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Community Scout</h3>
                            <span id="total-ratings-count" class="text-[10px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded">0 Ratings</span>
                        </div>
                        <div id="community-skill-breakdown" class="space-y-5">
                            <div class="animate-pulse bg-surface-container-highest h-4 w-full rounded"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="rating-modal" class="fixed inset-0 bg-black/80 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm opacity-0 transition-opacity">
        <div class="bg-surface-container-high p-6 md:p-8 rounded-2xl w-full max-w-sm border border-outline-variant/20 shadow-2xl transform scale-95 transition-transform">
            <h3 class="font-headline font-black italic text-2xl text-primary uppercase mb-1">Scout Player</h3>
            <p class="text-xs text-on-surface-variant mb-6">Rate this player across 5 key attributes.</p>
            
            <form id="rating-form" class="space-y-5">
                <div id="rating-stars-container" class="space-y-4"></div>
                <div class="flex gap-4 pt-6 mt-6 border-t border-outline-variant/10">
                    <button type="button" id="close-rating-modal" class="flex-1 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-widest text-on-surface-variant bg-surface-container hover:bg-surface-bright transition-colors">Cancel</button>
                    <button type="submit" id="submit-rating-btn" class="flex-1 px-4 py-3 rounded-xl text-xs font-black uppercase tracking-widest text-on-primary bg-primary hover:bg-primary/90 transition-all active:scale-95 shadow-lg shadow-primary/20">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="sidebar.js"></script>
    <script type="module" src="action-bar.js"></script>
    <script type="module" src="firebase-setup.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="profile.js"></script>
</body>
</html>
